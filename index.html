<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鐵騎酒吧 IRON RIDER BAR SYSTEM</title>
  
  <!-- Favicon 設定 -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for JSX compilation directly in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Import Maps for ES Modules -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.10.0/firebase-analytics.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>

  <!-- Global Styles -->
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); border-left: 1px solid rgba(220,38,38,0.1); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(153,27,27,0.6); border-radius: 0px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(220,38,38,0.8); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#050505] text-gray-200 font-sans selection:bg-red-500/30 overflow-hidden bg-[url('https://www.transparenttextures.com/patterns/asfalt-dark.png')]">
  
  <div id="root"></div>

  <!-- React & App Logic -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef, createContext, useContext } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAnalytics } from 'firebase/analytics';
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'firebase/auth';
    import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, updateDoc, deleteDoc, query, orderBy, limit, writeBatch } from 'firebase/firestore';
    import {
      Home, ShoppingCart, ListOrdered, Utensils, Package, Users, LogOut, GripVertical,
      Plus, Trash2, Edit, Check, X, Clock, Play, Square, DollarSign, TrendingUp, AlertCircle, Activity,
      Settings, Download, Upload, FileJson, ChevronLeft, ChevronRight, BarChart2, Calendar, Trophy, History, Sliders, Shield, Search, AlertTriangle, Zap, Calculator, ImageIcon, Copy, FileSpreadsheet, Warehouse, Eye, EyeOff, Tag
    } from 'lucide-react';

    // --- Firebase Initialization ---
    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBZRWfUdwo8x8lnZtAEPVNRU-CKZyZTjdw",
      authDomain: "jsvtb-48aff.firebaseapp.com",
      projectId: "jsvtb-48aff",
      storageBucket: "jsvtb-48aff.firebasestorage.app",
      messagingSenderId: "1010311063638",
      appId: "1:1010311063638:web:870c56def83e1de1df73f7",
      measurementId: "G-VV0PYS1VP0"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 根目錄設定為 irbs，主要資料庫文件為 system_data
    const ROOT_COLL = 'irbs';
    const ROOT_DOC = 'system_data';

    const getCollRef = (collName) => collection(db, ROOT_COLL, ROOT_DOC, collName);
    const getDocRef = (collName, docId) => doc(db, ROOT_COLL, ROOT_DOC, collName, docId);

    const toLocalDatetime = (isoStr) => {
      const d = new Date(isoStr);
      const pad = n => n.toString().padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    const PERMISSION_LIST = [
      { id: 'dashboard', label: '儀表板' }, { id: 'pos', label: '點餐系統' },
      { id: 'orders', label: '記帳歷史' }, { id: 'menu', label: '菜單管理' },
      { id: 'inventory', label: '庫存管理' },
      { id: 'activities', label: '活動優惠' }, { id: 'users', label: '成員管理' },
      { id: 'roles', label: '權限職位' }, { id: 'settings', label: '系統設定' }
    ];

    const COLL_NAMES_MAP = {
      bar_users: '成員帳號', bar_roles: '權限職位', bar_categories: '菜單分類',
      bar_items: '菜單品項', bar_activities: '活動優惠',
      bar_ingredients: '食材庫存', bar_orders: '記帳歷史', bar_inventory: '進貨紀錄',
      bar_operation_logs: '操作紀錄', bar_settings: '系統設定'
    };

    // --- Context API ---
    const AppContext = createContext(null);
    const useAppContext = () => useContext(AppContext);

    // --- Reusable UI Components ---
    const Button = ({ children, onClick, variant = 'primary', className = '', disabled = false }) => {
      const baseStyle = "px-4 py-2 rounded-sm font-black tracking-widest uppercase disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 transition-all";
      const variants = {
        primary: "bg-gradient-to-b from-red-700 to-red-900 text-white hover:from-red-600 hover:to-red-800 shadow-[0_0_15px_rgba(220,38,38,0.5)] border border-red-500/50",
        secondary: "bg-gradient-to-b from-yellow-600 to-yellow-800 text-white hover:from-yellow-500 hover:to-yellow-700 shadow-[0_0_15px_rgba(234,179,8,0.4)] border border-yellow-500/50",
        danger: "bg-black/80 text-red-500 hover:bg-[#121216] border border-red-900 hover:border-red-500 shadow-inner",
        outline: "border border-[#1f1f25] bg-[#050505] text-gray-400 hover:text-red-400 hover:border-red-900/50"
      };
      return (
        <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    };

    const Input = ({ value, onChange, placeholder, type = 'text', className = '', icon: Icon, ...props }) => (
      <div className={`relative ${className}`}>
        {Icon && <Icon size={16} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500" />}
        <input
          type={type} value={value} onChange={onChange} placeholder={placeholder}
          className={`w-full bg-[#050505] border border-[#1f1f25] text-gray-200 ${Icon ? 'pl-9' : 'px-4'} py-2.5 rounded-sm focus:outline-none focus:border-red-700 focus:ring-1 focus:ring-red-900/50 shadow-inner font-bold placeholder-gray-700`}
          {...props}
        />
      </div>
    );

    const Card = ({ children, className = '' }) => (
      <div className={`bg-[#0a0a0c] border border-red-950/50 rounded-lg p-6 shadow-[0_8px_30px_rgba(0,0,0,0.8)] relative overflow-hidden ${className}`}>
        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-red-900/30 to-transparent"></div>
        {children}
      </div>
    );

    // --- Custom Edit Modal Component ---
    const EditDialog = ({ dialog, onClose }) => {
      const [values, setValues] = useState(dialog.fields.reduce((acc, f) => ({...acc, [f.key]: f.defaultValue}), {}));

      return (
        <div className="fixed inset-0 bg-[#050505]/95 z-[100] flex items-center justify-center p-4">
          <Card className="max-w-md w-full border-yellow-500/50 shadow-[0_0_30px_rgba(234,179,8,0.2)]">
            <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
              <Edit size={20} className="text-yellow-500"/> {dialog.title}
            </h3>
            <div className="space-y-4 mb-6 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
              {dialog.fields.map(f => (
                <div key={f.key}>
                  {f.type !== 'checkbox' && <label className="block text-sm text-gray-400 mb-1 font-bold">{f.label}</label>}
                  {f.type === 'select' ? (
                    <select
                      className="w-full bg-[#121216] border border-[#1f1f25] text-white px-3 py-2 rounded-lg focus:border-red-500 font-bold"
                      value={values[f.key] !== undefined ? values[f.key] : ''} onChange={e => setValues({...values, [f.key]: e.target.value})}
                    >
                      {f.options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                    </select>
                  ) : f.type === 'checkbox' ? (
                    <label className="flex items-center gap-2 cursor-pointer mt-2 mb-2 p-3 border border-[#1f1f25] rounded-lg hover:bg-[#121216] bg-[#0a0a0c]">
                      <input
                        type="checkbox" checked={values[f.key] || false} onChange={e => setValues({...values, [f.key]: e.target.checked})}
                        className="w-4 h-4 accent-red-600"
                      />
                      <span className="text-gray-300 font-bold">{f.label}</span>
                    </label>
                  ) : (
                    <Input type={f.type || 'text'} value={values[f.key] !== undefined ? values[f.key] : ''} onChange={e => setValues({...values, [f.key]: e.target.value})} />
                  )}
                </div>
              ))}
            </div>
            <div className="flex justify-end gap-3">
              <Button variant="outline" onClick={onClose}>取消</Button>
              <Button variant="secondary" onClick={() => { dialog.onSave(values); onClose(); }}>確認儲存</Button>
            </div>
          </Card>
        </div>
      );
    };

    // --- Helper Functions ---
    const copyToClipboard = (text) => {
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
    };

    const downloadCSV = (content, filename) => {
      const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' }); // \uFEFF is BOM for Excel
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
    };

    const getStockForWarehouse = (ing, wId) => {
      if (ing.stocks && typeof ing.stocks[wId] !== 'undefined') return ing.stocks[wId];
      if (wId === 'default') return ing.stock || 0; // Legacy fallback
      return 0;
    };

    // --- Main App Component ---
    function App() {
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [isInitializing, setIsInitializing] = useState(true);

      const [appUser, setAppUser] = useState(null); 
      const [activeTab, setActiveTab] = useState('dashboard');

      const [allData, setAllData] = useState({
        users: [], roles: [], categories: [], items: [],
        activities: [], orders: [], inventoryLogs: [], ingredients: [],
        operationLogs: [], settingsData: []
      });
      
      const [dialog, setDialog] = useState(null); 

      const systemConfig = allData.settingsData.find(d => d.id === 'config') || { ignoreAllCosts: false, warehouses: [{ id: 'default', name: '預設主倉庫', capacity: 0 }] };
      const warehouses = systemConfig.warehouses && systemConfig.warehouses.length > 0 ? systemConfig.warehouses : [{ id: 'default', name: '預設主倉庫', capacity: 0 }];

      const isGuest = appUser === 'guest';
      const isLegacyAdmin = !isGuest && appUser?.role === 'admin';
      const fallbackPerms = isLegacyAdmin ? PERMISSION_LIST.reduce((acc, curr) => ({ ...acc, [curr.id]: true }), {}) : { dashboard: true, pos: true };
      const userRole = isGuest ? null : allData.roles.find(r => r.id === appUser?.role) || { permissions: fallbackPerms };

      const showConfirm = (message, onConfirm) => setDialog({ type: 'confirm', message, onConfirm });
      const showAlert = (message) => setDialog({ type: 'alert', message });
      const showEdit = (config) => setDialog({ type: 'edit', ...config });

      const logAction = async (action, details) => {
        if (!appUser || isGuest) return;
        try {
          await addDoc(getCollRef('bar_operation_logs'), { userName: appUser.name, action, details, timestamp: Date.now() });
        } catch (e) { console.error("Logging failed", e); }
      };

      // 結帳處理 (批次寫入 Transaction)
      const handleCheckout = async (orderData) => {
        try {
          const batch = writeBatch(db);
          
          const orderRef = doc(getCollRef('bar_orders'));
          batch.set(orderRef, { ...orderData, timestamp: Date.now() });

          const ingredientDeductions = {};
          for (const item of orderData.items) {
            if (item.recipe) {
              for (const req of item.recipe) {
                ingredientDeductions[req.ingredientId] = (ingredientDeductions[req.ingredientId] || 0) + (req.qty * item.qty);
              }
            }
          }

          for (const [ingId, consumeQty] of Object.entries(ingredientDeductions)) {
            const dbIngredient = allData.ingredients.find(ig => ig.id === ingId);
            if (dbIngredient) {
              const ingRef = getDocRef('bar_ingredients', ingId);
              const oldStocks = dbIngredient.stocks || { default: dbIngredient.stock || 0 };
              const targetWId = orderData.warehouseId || 'default';
              
              const newWarehouseStock = (oldStocks[targetWId] || 0) - consumeQty;
              const newStocks = { ...oldStocks, [targetWId]: newWarehouseStock };
              const newTotalStock = Object.values(newStocks).reduce((a, b) => a + b, 0);

              batch.update(ingRef, { stocks: newStocks, stock: newTotalStock });

              const invLogRef = doc(getCollRef('bar_inventory'));
              batch.set(invLogRef, {
                ingredientId: ingId, ingredientName: dbIngredient.name, changeQty: -consumeQty,
                reason: `訂單消耗 (${orderData.guestName})`, costPerItem: dbIngredient.cost || 0, 
                warehouseId: targetWId, timestamp: Date.now()
              });
            }
          }
          await batch.commit();
          return true;
        } catch (error) {
          console.error("Checkout error:", error);
          return false;
        }
      };

      // 初始化與資料抓取
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth);
          } catch (error) { console.error('Auth error:', error); }
        };
        initAuth();
        const unsub = onAuthStateChanged(auth, (user) => { setFirebaseUser(user); setIsInitializing(false); });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!firebaseUser) return;
        const unsubscribers = [];

        const subscribe = (collName, key, qObj = null) => {
          const q = qObj || getCollRef(collName);
          const unsub = onSnapshot(q, (snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setAllData(prev => ({ ...prev, [key]: data }));
          });
          unsubscribers.push(unsub);
        };

        subscribe('bar_users', 'users'); subscribe('bar_roles', 'roles');
        subscribe('bar_categories', 'categories'); subscribe('bar_items', 'items');
        subscribe('bar_activities', 'activities');
        subscribe('bar_ingredients', 'ingredients'); subscribe('bar_settings', 'settingsData');
        
        // 效能優化：限制龐大紀錄的回傳數量
        subscribe('bar_orders', 'orders', query(getCollRef('bar_orders'), orderBy('timestamp', 'desc'), limit(1500)));
        subscribe('bar_inventory', 'inventoryLogs', query(getCollRef('bar_inventory'), orderBy('timestamp', 'desc'), limit(1000)));
        subscribe('bar_operation_logs', 'operationLogs', query(getCollRef('bar_operation_logs'), orderBy('timestamp', 'desc'), limit(300)));

        return () => unsubscribers.forEach(u => u());
      }, [firebaseUser]);

      // 線上狀態
      useEffect(() => {
        if (!appUser || isGuest) return;
        const updateOnline = async () => { try { await updateDoc(getDocRef('bar_users', appUser.id), { isOnline: true, lastActive: Date.now() }); } catch(e){} };
        updateOnline();
        const interval = setInterval(updateOnline, 15000);
        return () => clearInterval(interval);
      }, [appUser]);

      const contextValue = useMemo(() => {
        // 效能優化：建立 Hash Map，讓後續所有的尋找成本降為 O(1)
        const ingredientMap = {};
        allData.ingredients.forEach(ig => ingredientMap[ig.id] = ig);
        const categoryMap = {};
        allData.categories.forEach(c => categoryMap[c.id] = c);

        return {
          ...allData, appUser, isGuest, userRole, systemConfig, warehouses,
          showAlert, showConfirm, showEdit, logAction, handleCheckout,
          ingredientMap, categoryMap
        };
      }, [allData, appUser, isGuest, userRole, systemConfig, warehouses]);


      if (isInitializing) return <div className="min-h-screen bg-[#050505] flex items-center justify-center text-red-500 text-2xl font-bold">SYSTEM BOOTING...</div>;

      if (!appUser) return <LoginScreen users={allData.users} roles={allData.roles} onLogin={setAppUser} onGuest={() => setAppUser('guest')} />;

      const activeUsers = allData.users.filter(u => u.isOnline && (Date.now() - u.lastActive < 30000));
      const allNavItems = [
        { id: 'dashboard', label: '儀表板', icon: Home }, { id: 'pos', label: '點餐系統', icon: ShoppingCart },
        { id: 'orders', label: '記帳歷史', icon: ListOrdered }, { id: 'menu', label: '菜單管理', icon: Utensils },
        { id: 'inventory', label: '庫存管理', icon: Package },
        { id: 'activities', label: '活動優惠', icon: Activity }, { id: 'users', label: '成員管理', icon: Users },
        { id: 'roles', label: '權限職位', icon: Shield }, { id: 'settings', label: '系統設定', icon: Settings },
      ];

      const navItems = isGuest ? allNavItems.filter(i => i.id === 'dashboard') : allNavItems.filter(i => userRole.permissions[i.id]);
      if (!navItems.find(i => i.id === activeTab) && navItems.length > 0) setActiveTab(navItems[0].id);

      const logout = async () => {
        if (!isGuest) await updateDoc(getDocRef('bar_users', appUser.id), { isOnline: false });
        setAppUser(null);
      };

      return (
        <AppContext.Provider value={contextValue}>
          <div className="flex flex-col md:flex-row h-screen">
            
            {/* Sidebar */}
            <aside className="w-full md:w-64 bg-[#0a0a0c] border-b md:border-b-0 md:border-r border-red-950 flex flex-col flex-shrink-0 shadow-[4px_0_24px_rgba(0,0,0,0.9)] relative z-10">
              <div className="absolute inset-0 bg-gradient-to-b from-red-900/10 to-transparent pointer-events-none"></div>
              <div className="p-6 flex items-center justify-center border-b border-red-950/50">
                <img src="https://i.meee.com.tw/ncmL8U6.png" alt="LOGO" className="h-24 md:h-32 object-contain drop-shadow-[0_0_20px_rgba(220,38,38,0.6)]" />
              </div>
              
              <div className="p-4 flex-grow overflow-y-auto custom-scrollbar">
                <nav className="space-y-2">
                  {navItems.map(item => {
                    const Icon = item.icon;
                    const isActive = activeTab === item.id;
                    return (
                      <button
                        key={item.id} onClick={() => setActiveTab(item.id)}
                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-sm transition-all ${
                          isActive 
                            ? 'bg-gradient-to-r from-red-950 to-black text-red-100 font-black shadow-[0_0_15px_rgba(220,38,38,0.2)] border-l-4 border-red-600' 
                            : 'text-gray-500 hover:bg-[#121216] hover:text-red-300 border-l-4 border-transparent'
                        }`}
                      >
                        <Icon size={20} className={isActive ? 'text-red-500' : ''} />
                        <span className="tracking-widest uppercase text-sm">{item.label}</span>
                      </button>
                    );
                  })}
                </nav>
              </div>

              <div className="p-4 border-t border-red-950/50 bg-[#050505]">
                <div className="mb-4">
                  <p className="text-[10px] text-gray-500 uppercase tracking-widest mb-2 font-bold flex items-center gap-1"><Zap size={10} className="text-yellow-500"/> ONLINE</p>
                  <div className="flex flex-wrap gap-2">
                    {activeUsers.length === 0 ? <span className="text-sm text-gray-700">無人上線</span> : activeUsers.map(u => (
                      <div key={u.id} className="flex items-center gap-1 bg-[#121216] px-2 py-1 rounded border border-[#1f1f25] text-xs shadow-sm">
                        <div className="w-2 h-2 rounded-full bg-red-600 shadow-[0_0_5px_#dc2626]"></div>
                        <span className={u.role === 'admin_role' ? 'text-red-500 font-bold' : 'text-gray-400'}>{u.name}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="flex items-center justify-between bg-[#0a0a0c] p-3 rounded-sm border border-red-950/50 shadow-inner group">
                  <div>
                    <p className="text-sm font-black text-gray-200 group-hover:text-red-500 tracking-wider">{isGuest ? '遊客模式' : appUser.name}</p>
                    <p className="text-[10px] text-gray-600 uppercase tracking-widest">{isGuest ? '僅供預覽' : (allData.roles.find(r => r.id === appUser.role)?.name || '未知權限')}</p>
                  </div>
                  <button onClick={logout} className="text-gray-600 hover:text-red-500 hover:bg-[#121216] p-2 rounded-sm transition-colors" title="登出">
                    <LogOut size={18} />
                  </button>
                </div>
              </div>
            </aside>

            {/* Main Content Area */}
            <main className="flex-grow flex flex-col h-screen overflow-hidden relative">
              <header className="bg-[#0a0a0c] border-b border-red-950/50 p-4 md:px-8 shadow-[0_4px_20px_rgba(0,0,0,0.8)] flex-shrink-0 z-10 flex items-center">
                <h1 className="text-xl md:text-2xl font-black text-gray-100 tracking-[0.2em] uppercase flex items-center gap-3">
                  <span className="w-2 h-6 bg-red-700 rounded-sm shadow-[0_0_10px_#dc2626]"></span>
                  {navItems.find(i => i.id === activeTab)?.label || '系統'}
                </h1>
              </header>

              <div className="flex-grow overflow-y-auto p-4 md:p-8 custom-scrollbar relative z-0">
                <div className="max-w-7xl mx-auto pb-10">
                  {activeTab === 'dashboard' && <DashboardView />}
                  {activeTab === 'pos' && <POSView />}
                  {activeTab === 'orders' && <OrdersView />}
                  {activeTab === 'menu' && <MenuManager />}
                  {activeTab === 'inventory' && <InventoryManager />}
                  {activeTab === 'activities' && <ActivityManager />}
                  {activeTab === 'users' && <UserManager />}
                  {activeTab === 'roles' && <RoleManager />}
                  {activeTab === 'settings' && <SettingsView />}
                </div>
              </div>
            </main>

            {dialog?.type === 'edit' && <EditDialog dialog={dialog} onClose={() => setDialog(null)} />}
            {dialog && dialog.type !== 'edit' && (
              <div className="fixed inset-0 bg-[#050505]/95 z-[100] flex items-center justify-center p-4">
                <Card className="max-w-sm w-full border-red-600 shadow-[0_0_30px_rgba(220,38,38,0.2)]">
                  <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2">
                    <AlertCircle className="text-red-500"/> {dialog.type === 'confirm' ? '請確認操作' : '系統提示'}
                  </h3>
                  <p className="text-gray-300 mb-6 leading-relaxed">{dialog.message}</p>
                  <div className="flex justify-end gap-3">
                    {dialog.type === 'confirm' && <Button variant="outline" onClick={() => setDialog(null)}>取消</Button>}
                    <Button variant="primary" onClick={() => { if (dialog.onConfirm) dialog.onConfirm(); setDialog(null); }}>確定</Button>
                  </div>
                </Card>
              </div>
            )}
          </div>
        </AppContext.Provider>
      );
    }

    // VIEWS
    // ==========================================

    const LoginScreen = ({ users, roles, onLogin, onGuest }) => {
      const [selectedUser, setSelectedUser] = useState(null);
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [error, setError] = useState('');

      const handleLogin = () => {
        if (selectedUser.password === password) onLogin(selectedUser);
        else { setError('密碼錯誤，請重新輸入！'); setPassword(''); }
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
          <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none opacity-40">
            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-red-900 rounded-full mix-blend-screen filter blur-[150px] opacity-30"></div>
          </div>

          <div className="z-10 w-full max-w-md">
            <div className="text-center mb-10">
              <img src="https://i.meee.com.tw/ncmL8U6.png" alt="Logo" className="h-56 md:h-72 mx-auto drop-shadow-[0_0_30px_rgba(220,38,38,0.7)] mb-4" />
            </div>

            <Card className="border-red-950/80 bg-[#0a0a0c] shadow-[0_10px_40px_rgba(0,0,0,0.9)]">

                <div className="space-y-4">
                  <h2 className="text-lg font-black text-gray-400 border-b border-red-950/50 pb-3 mb-5 flex items-center gap-2 tracking-widest uppercase">
                    <Users size={18} className="text-red-600"/> 選擇授權身分
                  </h2>
                  <div className="grid grid-cols-2 gap-3 max-h-[300px] overflow-y-auto custom-scrollbar pr-2">
                    {users.map(u => {
                      const isTopAdmin = u.role === 'admin_role';
                      return (
                        <button
                          key={u.id} onClick={() => setSelectedUser(u)}
                          className="p-4 bg-[#121216] border border-[#1f1f25] rounded-sm hover:border-red-700 hover:bg-[#1a1a1f] flex flex-col items-center justify-center gap-3 group transition-colors shadow-inner"
                        >
                          <Shield size={26} className={isTopAdmin ? 'text-red-600 drop-shadow-[0_0_8px_rgba(220,38,38,0.8)]' : 'text-gray-600 group-hover:text-red-500'} />
                          <span className="text-gray-300 font-black text-sm tracking-wider">{u.name}</span>
                        </button>
                      );
                    })}
                  </div>
                  {users.length === 0 && <p className="text-gray-600 text-center py-4 text-sm font-bold uppercase tracking-widest">系統初始化中...</p>}
                  
                  <div className="mt-8 pt-4 border-t border-[#1f1f25]">
                    <button
                      onClick={onGuest}
                      className="w-full py-3 text-xs font-black tracking-[0.3em] text-gray-600 hover:text-red-400 bg-[#050505] rounded-sm hover:bg-[#121216] border border-[#1f1f25] hover:border-red-900 transition-colors"
                    >
                      [ 進入遊客預覽模式 ]
                    </button>
                  </div>
                </div>
              ) : (
                <div className="space-y-6">
                  <div className="flex items-center gap-4 border-b border-red-950/50 pb-4">
                    <button onClick={() => { setSelectedUser(null); setError(''); setPassword(''); setShowPassword(false); }} className="text-gray-500 hover:text-red-500 p-2 bg-[#050505] border border-[#1f1f25] rounded-sm hover:bg-[#121216] transition-colors">
                      <ChevronLeft size={20} />
                    </button>
                    <div>
                      <h2 className="text-2xl font-black text-white tracking-widest uppercase drop-shadow-md">{selectedUser.name}</h2>
                      <p className="text-xs text-red-500 font-bold tracking-widest uppercase">{roles.find(r => r.id === selectedUser.role)?.name || '系統身分'}</p>
                    </div>
                  </div>
                  
                  <div>
                    <div className="relative">
                      <input
                        type={showPassword ? "text" : "password"}
                        value={password}
                        onChange={(e) => setPassword(e.target.value)}
                        onKeyDown={(e) => e.key === 'Enter' && handleLogin()}
                        className="w-full bg-black border border-red-950 text-red-500 text-center text-3xl tracking-[0.5em] py-5 rounded-sm focus:outline-none focus:border-red-600 focus:ring-1 focus:ring-red-900/50 shadow-inner font-mono placeholder-gray-800 placeholder:text-base placeholder:tracking-widest"
                        placeholder="PASSWORD"
                        autoFocus
                      />
                      <button
                        type="button"
                        onClick={() => setShowPassword(!showPassword)}

    };

    const DashboardView = () => {
      const { orders, inventoryLogs, ingredients, systemConfig, isGuest } = useAppContext();
      const [period, setPeriod] = useState('month'); 
      const [refDate, setRefDate] = useState(new Date());

      const lowStockItems = useMemo(() => ingredients.filter(i => (i.stock || 0) <= 5).sort((a,b) => (a.stock||0) - (b.stock||0)), [ingredients]);

      const { startDate, endDate, periodLabel, chartTicks } = useMemo(() => {
        const d = new Date(refDate);
        let start, end, label, ticks = [];
        if (period === 'week') {
          const day = d.getDay();
          const diff = d.getDate() - day + (day === 0 ? -6 : 1); 
          start = new Date(d.setDate(diff)); start.setHours(0, 0, 0, 0);
          end = new Date(start); end.setDate(start.getDate() + 6); end.setHours(23, 59, 59, 999);
          label = `${start.getMonth() + 1}月${start.getDate()}日 - ${end.getMonth() + 1}月${end.getDate()}日`;
          const weekDays = ['週一', '週二', '週三', '週四', '週五', '週六', '週日'];
          for (let i = 0; i < 7; i++) {
            const t = new Date(start); t.setDate(start.getDate() + i);
            ticks.push({ label: weekDays[i], matchStart: t.getTime(), matchEnd: t.getTime() + 86399999 });
          }
        } else if (period === 'month') {
          start = new Date(d.getFullYear(), d.getMonth(), 1);
          end = new Date(d.getFullYear(), d.getMonth() + 1, 0, 23, 59, 59, 999);
          label = `${d.getFullYear()}年 ${d.getMonth() + 1}月`;
          const days = end.getDate();
          for (let i = 1; i <= days; i++) {
            const t = new Date(d.getFullYear(), d.getMonth(), i);
            ticks.push({ label: `${i}日`, matchStart: t.getTime(), matchEnd: t.getTime() + 86399999 });
          }
        } else {
          start = new Date(d.getFullYear(), 0, 1);
          end = new Date(d.getFullYear(), 11, 31, 23, 59, 59, 999);
          label = `${d.getFullYear()} 年度`;
          for (let i = 0; i < 12; i++) {
            const tStart = new Date(d.getFullYear(), i, 1);
            const tEnd = new Date(d.getFullYear(), i + 1, 0, 23, 59, 59, 999);
            ticks.push({ label: `${i + 1}月`, matchStart: tStart.getTime(), matchEnd: tEnd.getTime() });
          }
        }
        return { startDate: start, endDate: end, periodLabel: label, chartTicks: ticks };
      }, [period, refDate]);

      const changeDate = (delta) => {
        const newD = new Date(refDate);
        if (period === 'week') newD.setDate(newD.getDate() + delta * 7);
        if (period === 'month') newD.setMonth(newD.getMonth() + delta);
        if (period === 'year') newD.setFullYear(newD.getFullYear() + delta);
        setRefDate(newD);
      };

      const { stats, chartData, topItems } = useMemo(() => {
        const sTs = startDate.getTime(), eTs = endDate.getTime();
        const pOrders = orders.filter(o => o.timestamp >= sTs && o.timestamp <= eTs);
        const pInv = inventoryLogs.filter(l => l.timestamp >= sTs && l.timestamp <= eTs);

        const revenue = pOrders.reduce((s, o) => s + o.total, 0);
        const cogs = systemConfig.ignoreAllCosts ? 0 : pOrders.reduce((s, o) => s + (o.totalCost || 0), 0); 
        const inventoryCost = systemConfig.ignoreAllCosts ? 0 : pInv.filter(l => l.changeQty > 0 && l.reason.includes('進貨')).reduce((s, l) => s + (l.changeQty * (l.costPerItem || 0)), 0);

        const cData = chartTicks.map(tick => {
          const tOrders = pOrders.filter(o => o.timestamp >= tick.matchStart && o.timestamp <= tick.matchEnd);
          const tRev = tOrders.reduce((s, o) => s + o.total, 0);
          const tCogs = systemConfig.ignoreAllCosts ? 0 : tOrders.reduce((s, o) => s + (o.totalCost || 0), 0);
          return { label: tick.label, revenue: tRev, profit: tRev - tCogs };
        });

        const iSales = {};
        pOrders.forEach(o => o.items.forEach(i => {
          if (!iSales[i.name]) iSales[i.name] = { qty: 0, revenue: 0 };
          iSales[i.name].qty += i.qty; iSales[i.name].revenue += ((i.price || 0) * i.qty);
        }));
        const top = Object.entries(iSales).map(([n, d]) => ({ name: n, ...d })).sort((a, b) => b.revenue - a.revenue).slice(0, 5);

        return { stats: { revenue, profit: revenue - cogs, inventoryCost, orderCount: pOrders.length }, chartData: cData, topItems: top };
      }, [startDate, endDate, orders, inventoryLogs, chartTicks, systemConfig.ignoreAllCosts]);

      const maxChart = Math.max(...chartData.map(d => Math.max(d.revenue, d.profit, 1)));
      const blurClass = isGuest ? "blur-[6px] select-none pointer-events-none opacity-50" : "";

      return (
        <div className="space-y-6">
          {isGuest && (
            <div className="bg-yellow-950/40 border border-yellow-900/50 text-yellow-300 p-4 rounded-xl flex items-center gap-3 font-bold shadow-lg">
              <AlertCircle size={24} />
              遊客預覽模式啟動。核心營運數據已啟動最高級別模糊遮罩，請登入專屬授權帳號以解鎖。
            </div>
          )}

          {lowStockItems.length > 0 && (
            <Card className="border-red-600/50 shadow-[0_0_15px_rgba(220,38,38,0.15)] overflow-hidden relative">
              <div className="absolute top-0 right-0 w-32 h-32 bg-red-600/10 blur-2xl rounded-full"></div>
              <h2 className="text-lg font-bold text-red-400 mb-4 flex items-center gap-2">
                <AlertTriangle size={20} /> 庫存低位警報
              </h2>
              <div className="flex gap-3 overflow-x-auto pb-2 custom-scrollbar">
                {lowStockItems.map(ing => (
                  <div key={ing.id} className="flex-shrink-0 bg-red-950/40 border border-red-900/50 rounded-lg px-4 py-2 flex flex-col items-center justify-center min-w-[100px]">
                    <span className="text-gray-300 text-sm font-bold mb-1">{ing.name}</span>
                    <span className={`text-2xl font-black ${ing.stock <= 0 ? 'text-red-500' : 'text-yellow-500'}`}>{ing.stock || 0}</span>
                  </div>
                ))}
              </div>
            </Card>
          )}

          <div className="flex flex-col md:flex-row justify-between items-center bg-[#0a0a0c] p-2 md:p-4 rounded-xl border border-[#1f1f25] shadow-lg gap-4">
            <div className="flex bg-[#121216] rounded-lg p-1 w-full md:w-auto">
              {['week', 'month', 'year'].map(p => (
                <button
                  key={p} onClick={() => setPeriod(p)}
                  className={`flex-1 md:flex-none px-4 py-2 rounded-md text-sm font-bold ${period === p ? 'bg-red-600 text-white shadow-md' : 'text-gray-400 hover:text-gray-200 hover:bg-[#1a1a1f]'}`}
                >
                  {p === 'week' ? '單週' : p === 'month' ? '單月' : '年度'}
                </button>
              ))}
            </div>

            <div className="flex items-center gap-4 bg-[#121216] px-4 py-2 rounded-lg border border-[#1f1f25]">
              <button onClick={() => changeDate(-1)} className="p-1 hover:text-red-500"><ChevronLeft size={20} /></button>
              <div className="flex items-center gap-2 text-lg font-bold text-white min-w-[150px] justify-center tracking-wider">
                <Calendar size={18} className="text-red-500" /> {periodLabel}
              </div>
              <button onClick={() => changeDate(1)} className="p-1 hover:text-red-500"><ChevronRight size={20} /></button>
            </div>
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
            {[
              { label: '期間營收', val: stats.revenue, icon: DollarSign, color: 'text-white', border: 'border-t-blue-500', shadow: 'shadow-blue-900/20' },
              { label: '實質淨利', val: stats.profit, icon: TrendingUp, color: 'text-yellow-400 drop-shadow-[0_0_8px_rgba(234,179,8,0.5)]', border: 'border-t-yellow-500', shadow: 'shadow-yellow-900/20' },
              { label: '訂單總數', val: stats.orderCount, icon: ListOrdered, color: 'text-white', border: 'border-t-green-500', shadow: 'shadow-green-900/20', isNum: true },
              { label: '進貨花費', val: stats.inventoryCost, icon: Package, color: 'text-gray-300', border: 'border-t-gray-500', shadow: 'shadow-gray-900/20' }
            ].map((card, idx) => (
              <Card key={idx} className={`flex flex-col border-t-4 ${card.border} ${card.shadow} p-5 relative overflow-hidden`}>
                <p className="text-gray-400 text-xs md:text-sm mb-2 flex items-center gap-2 font-bold uppercase tracking-wider"><card.icon size={16} className={card.color.includes('yellow') ? 'text-yellow-500' : ''}/> {card.label}</p>
                <h3 className={`text-2xl md:text-3xl font-black ${card.color} ${!card.isNum ? blurClass : ''}`}>
                  {!card.isNum && '$'}{card.val.toLocaleString()} {card.isNum && <span className="text-sm text-gray-500 font-normal">單</span>}
                </h3>
                {isGuest && !card.isNum && <div className="absolute inset-0 flex items-center justify-center text-gray-500/50 font-black rotate-[-15deg] tracking-[0.5em] text-xl pointer-events-none">CLASSIFIED</div>}
              </Card>
            ))}
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <Card className="lg:col-span-2 bg-[#0a0a0c] relative overflow-hidden border-[#1f1f25]">
              <div className="flex justify-between items-center mb-6">
                <h2 className="text-lg font-bold text-white flex items-center gap-2"><BarChart2 size={20} className="text-red-500"/> 營收與淨利走勢</h2>
                <div className="flex gap-4 text-xs font-bold">
                  <span className="flex items-center gap-1 text-gray-300"><span className="w-3 h-3 rounded bg-blue-500/80"></span> 總營收</span>
                  <span className="flex items-center gap-1 text-gray-300"><span className="w-3 h-3 rounded bg-yellow-500 shadow-[0_0_8px_#eab308]"></span> 淨利</span>
                </div>
              </div>
              
              <div className={`w-full h-[280px] flex items-end gap-[2px] sm:gap-1 relative pt-6 pb-6 border-b border-[#1f1f25] ${blurClass}`}>
                {[25, 50, 75].map(pct => (
                  <div key={pct} className="absolute w-full border-b border-[#1f1f25] border-dashed z-0" style={{ bottom: `${pct}%` }}></div>
                ))}

                {chartData.map((d, idx) => (
                  <div key={idx} className="flex-1 flex flex-col justify-end items-center group relative h-full z-10 cursor-crosshair">
                    <div className="absolute bottom-full mb-3 hidden group-hover:block bg-[#121216] border border-[#1f1f25] text-xs p-3 rounded-lg shadow-2xl pointer-events-none whitespace-nowrap z-50">
                      <div className="font-bold text-gray-200 mb-1 border-b border-[#1f1f25] pb-1">{d.label}</div>
                      <div className="text-blue-400 font-mono">Rev: ${Math.round(d.revenue).toLocaleString()}</div>
                      <div className="text-yellow-400 font-mono">Net: ${Math.round(d.profit).toLocaleString()}</div>
                    </div>
                    
                    <div className="w-full max-w-[20px] flex flex-col justify-end h-full relative">
                      <div className="absolute bottom-0 w-full bg-blue-500/60 rounded-t-sm group-hover:brightness-125" style={{ height: `${(d.revenue / maxChart) * 100}%`, minHeight: d.revenue > 0 ? '4px' : '0' }}></div>
                      <div className="absolute bottom-0 w-full bg-yellow-500 rounded-t-sm shadow-[0_0_8px_rgba(234,179,8,0.5)] group-hover:brightness-125 group-hover:shadow-[0_0_15px_rgba(234,179,8,0.8)]" style={{ height: `${(d.profit / maxChart) * 100}%`, minHeight: d.profit > 0 ? '4px' : '0' }}></div>
                    </div>
                    <div className="text-[9px] sm:text-[10px] text-gray-500 mt-2 truncate w-full text-center group-hover:text-white">
                      {period === 'month' ? d.label.replace('日', '') : d.label}
                    </div>
                  </div>
                ))}
              </div>
              {isGuest && <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-20">
                <span className="bg-red-900/80 text-red-100 px-6 py-2 rounded-full border border-red-500 font-black tracking-widest shadow-[0_0_20px_#dc2626]">DATA CLASSIFIED</span>
              </div>}
            </Card>

            <Card className="lg:col-span-1 border border-[#1f1f25]">
              <h2 className="text-lg font-bold text-white mb-6 flex items-center gap-2"><Trophy size={20} className="text-yellow-500"/> 熱銷排行榜 TOP 5</h2>
              <div className="space-y-3">
                {topItems.length === 0 ? <p className="text-gray-500 text-center py-10 font-bold">尚無銷售紀錄</p> : 
                  topItems.map((item, index) => (
                    <div key={item.name} className="flex items-center gap-3 bg-[#121216] p-3 rounded-xl border border-[#1f1f25] hover:border-[#33333b]">
                      <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-black text-sm shadow-inner ${
                        index === 0 ? 'bg-gradient-to-br from-yellow-300 to-yellow-600 text-gray-900 shadow-[0_0_15px_rgba(234,179,8,0.4)]' :
                        index === 1 ? 'bg-gradient-to-br from-gray-300 to-gray-500 text-gray-900' :
                        index === 2 ? 'bg-gradient-to-br from-amber-600 to-amber-800 text-white' : 'bg-[#1a1a1f] text-gray-500'
                      }`}>{index + 1}</div>
                      <div className="flex-grow min-w-0">
                        <p className="font-bold text-gray-200 truncate">{item.name}</p>
                        <p className="text-[10px] text-gray-500 uppercase tracking-wider">{item.qty} UNITS SOLD</p>
                      </div>
                      <div className={`text-right font-black text-red-400 ${blurClass} font-mono`}>
                        ${item.revenue.toLocaleString()}
                      </div>
                    </div>
                  ))
                }
              </div>
            </Card>
          </div>
        </div>
      );
    };

    const POSView = () => {
      const { items, categories, activities, ingredients, warehouses, handleCheckout, showAlert, showConfirm, logAction, systemConfig, ingredientMap } = useAppContext();
      const [cart, setCart] = useState([]);
      const [guestName, setGuestName] = useState('');
      const [selectedCategoryId, setSelectedCategoryId] = useState('all');
      const [selectedActivityId, setSelectedActivityId] = useState('none');
      const [selectedWarehouseId, setSelectedWarehouseId] = useState(warehouses[0]?.id || 'default');
      const [isProcessing, setIsProcessing] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');

      const activeActs = useMemo(() => {
        const now = new Date().toISOString();
        return activities.filter(a => a.isActive && a.startTime <= now && a.endTime >= now);
      }, [activities]);

      const updateCart = (item, delta = 1) => {
        setCart(prev => {
          const exist = prev.find(i => i.id === item.id);
          if (exist) return prev.map(i => i.id === item.id ? { ...i, qty: Math.max(0, i.qty + delta) } : i).filter(i => i.qty > 0);
          return delta > 0 ? [...prev, { ...item, qty: 1 }] : prev;
        });
      };

      const cartTotals = useMemo(() => {
        const subtotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
        const totalCost = systemConfig.ignoreAllCosts ? 0 : cart.reduce((s, cItem) => {
          let iCost = cItem.recipe ? cItem.recipe.reduce((c, req) => {
            const ig = ingredientMap[req.ingredientId];
            return c + (!ig || ig.ignoreCost ? 0 : (ig.cost || 0) * req.qty);
          }, 0) : 0;
          return s + (iCost * cItem.qty);
        }, 0);
        
        let discount = 0;
        const act = activeActs.find(a => a.id === selectedActivityId);
        if (act) discount = act.type === 'percent' ? subtotal * (1 - act.value / 100) : act.value;
        
        const total = Math.max(0, subtotal - discount);
        return { subtotal, discount, total, totalCost, profit: total - totalCost };
      }, [cart, selectedActivityId, activeActs, systemConfig.ignoreAllCosts, ingredientMap]);

      const displayItems = useMemo(() => {
        let filtered = items;
        if (selectedCategoryId !== 'all') filtered = filtered.filter(i => i.categoryId === selectedCategoryId);
        if (searchQuery.trim()) filtered = filtered.filter(i => i.name.toLowerCase().includes(searchQuery.toLowerCase()));
        return filtered.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
      }, [items, selectedCategoryId, searchQuery]);

      const cartUsage = useMemo(() => {
        const usage = {};
        cart.forEach(c => c.recipe?.forEach(req => usage[req.ingredientId] = (usage[req.ingredientId] || 0) + (req.qty * c.qty)));
        return usage;
      }, [cart]);

      const getMakableQty = (item) => {
        if (!item.recipe?.length) return null; 
        let minQty = Infinity;
        for (const req of item.recipe) {
          const ing = ingredientMap[req.ingredientId];
          if (!ing) return 0; 
          const wStock = getStockForWarehouse(ing, selectedWarehouseId);
          const avail = wStock - (cartUsage[req.ingredientId] || 0);
          minQty = Math.min(minQty, Math.floor(Math.max(0, avail) / req.qty));
        }
        return minQty === Infinity ? 0 : minQty;
      };

      const processOrder = async () => {
        if (!guestName.trim()) return showAlert("請輸入客人名稱或桌號");
        if (cart.length === 0) return;
        setIsProcessing(true);
        const success = await handleCheckout({
          guestName, items: cart, ...cartTotals, warehouseId: selectedWarehouseId, activityId: selectedActivityId !== 'none' ? selectedActivityId : null
        });
        if (success) {
          const whName = warehouses.find(w => w.id === selectedWarehouseId)?.name || '未知倉庫';
          logAction('新增點餐', `桌號/客人: ${guestName}, 金額: $${Math.round(cartTotals.total)} (來自: ${whName})`);
          setCart([]); setGuestName(''); setSelectedActivityId('none');
        } else showAlert("結帳失敗，請重試");
        setIsProcessing(false);
      };

      const clearCart = () => {
        if (cart.length === 0 && !guestName) return;
        showConfirm("確定要清空當前購物車的所有餐點與客人資訊嗎？", () => {
          setCart([]);
          setGuestName('');
          setSelectedActivityId('none');
        });
      };

      return (
        <div className="flex flex-col gap-6 h-full min-h-[calc(100vh-140px)]">
          
          {/* 上方：點餐明細區塊 */}
          <Card className="w-full flex-shrink-0 flex flex-col p-5 border-red-900/30 shadow-xl h-auto max-h-[45vh]">
            <div className="flex justify-between items-center mb-4 border-b border-[#1f1f25] pb-3">
              <h2 className="text-xl font-black text-white flex items-center gap-2"><ShoppingCart size={20} className="text-red-500"/> 點餐明細</h2>
              <div className="flex items-center gap-2">
                <button onClick={clearCart} className="bg-red-950 hover:bg-red-900 text-red-500 hover:text-red-400 text-xs px-2 py-1.5 rounded border border-red-900/50 flex items-center gap-1 transition-colors" title="清空購物車">
                  <Trash2 size={14}/> 清空
                </button>
                <div className="flex items-center gap-2 bg-[#121216] px-3 py-1.5 rounded-lg border border-[#1f1f25] shadow-inner">
                  <Warehouse size={16} className="text-gray-400" />
                  <select value={selectedWarehouseId} onChange={e=>setSelectedWarehouseId(e.target.value)} className="bg-transparent text-white font-bold text-sm focus:outline-none">
                    {warehouses.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}
                  </select>
                </div>
              </div>
            </div>
            
            <div className="flex flex-col lg:flex-row gap-4 h-full overflow-hidden">
              {/* 左側：購物車列表 */}
              <div className="flex-grow flex flex-col h-full min-h-[150px]">
                 <div className="mb-3">
                  <Input value={guestName} onChange={e=>setGuestName(e.target.value)} placeholder="客人名稱 / 桌號 *" className="w-full sm:w-64 font-bold" />
                </div>
                <div className="flex-grow overflow-y-auto bg-[#050505] rounded-xl p-2 space-y-2 custom-scrollbar border border-[#1f1f25] shadow-inner">
                  {cart.length === 0 ? <p className="text-gray-600 text-center py-6 font-bold text-sm">購物車是空的</p> : 
                    cart.map(item => (
                      <div key={item.id} className="flex justify-between items-center bg-[#121216] p-2.5 rounded-lg border border-[#1f1f25] shadow-sm">
                        <div className="flex-grow pr-2 min-w-0">
                          <p className="text-sm font-bold text-gray-200 truncate">{item.name}</p>
                          <p className="text-xs text-red-400 font-mono">${item.price}</p>
                        </div>
                        <div className="flex items-center gap-3 bg-[#050505] rounded-md p-1 border border-[#1f1f25] flex-shrink-0">
                          <button onClick={() => updateCart(item, -1)} className="w-7 h-7 bg-[#1a1a1f] rounded hover:bg-[#2a2a30] text-white flex items-center justify-center">-</button>
                          <span className="w-4 text-center text-sm font-bold">{item.qty}</span>
                          <button onClick={() => updateCart(item, 1)} className="w-7 h-7 bg-red-600/90 rounded hover:bg-red-500 text-white flex items-center justify-center shadow-sm">+</button>
                        </div>
                      </div>
                    ))}
                </div>
              </div>

              {/* 右側：結帳資訊 */}
              <div className="w-full lg:w-72 flex-shrink-0 flex flex-col bg-[#0a0a0c] p-4 rounded-xl border border-[#1f1f25] overflow-hidden">
                {/* 所需材料區塊 */}
                <div className="flex-grow overflow-y-auto mb-4 custom-scrollbar bg-[#050505] rounded-lg p-2 border border-[#1f1f25] shadow-inner">
                  <h4 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 flex items-center gap-1 border-b border-[#1f1f25] pb-2">
                    <Package size={14} className="text-yellow-500"/> 訂單所需材料預估
                  </h4>
                  {Object.keys(cartUsage).length === 0 ? (
                    <p className="text-xs text-gray-600 text-center py-4 font-bold">目前無材料消耗紀錄</p>
                  ) : (
                    <div className="space-y-1.5 pr-1">
                      {Object.entries(cartUsage).map(([ingId, qty]) => {
                        const ing = ingredients.find(i => i.id === ingId);
                        const wStock = getStockForWarehouse(ing || {}, selectedWarehouseId);
                        const isShort = wStock < qty;
                        return (
                          <div key={ingId} className="flex justify-between items-center text-xs bg-[#121216] px-2 py-1.5 rounded border border-[#1f1f25] shadow-sm">
                            <span className="text-gray-300 truncate pr-2">{ing?.name || '未知'}</span>
                            <span className={`font-mono font-bold flex-shrink-0 flex items-center gap-1 ${isShort ? 'text-red-400' : 'text-yellow-400'}`}>
                              {qty} 單位 {isShort && <span className="text-[10px] bg-red-950/80 text-red-500 border border-red-900/50 px-1 rounded shadow-sm">缺</span>}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                <div className="space-y-2 pt-3 border-t border-[#1f1f25] flex-shrink-0">
                  <div className="flex justify-between text-gray-400 text-sm font-mono"><span>Subtotal</span><span>${cartTotals.subtotal}</span></div>
                  <select value={selectedActivityId} onChange={e=>setSelectedActivityId(e.target.value)} className="w-full bg-[#121216] border border-[#1f1f25] text-white px-3 py-2 rounded-lg text-sm focus:border-red-500">
                    <option value="none">無活動折扣</option>
                    {activeActs.map(a => <option key={a.id} value={a.id}>{a.name} ({a.type==='percent'?`${a.value}%`:`-$${a.value}`})</option>)}
                  </select>
                  {cartTotals.discount > 0 && <div className="flex justify-between text-yellow-400 text-sm font-bold font-mono pt-1"><span>Discount</span><span>-${Math.round(cartTotals.discount)}</span></div>}
                  
                  <div className="flex justify-between items-end pt-2 border-t border-[#1f1f25] mt-2">
                    <span className="text-gray-400 font-bold uppercase tracking-wider text-sm mb-1">Total</span>
                    <span className="text-4xl font-black text-red-500 font-mono">${Math.round(cartTotals.total)}</span>
                  </div>

                  <Button onClick={processOrder} disabled={cart.length===0 || !guestName.trim() || isProcessing} className="w-full py-3 mt-3 text-lg shadow-lg">
                    {isProcessing ? 'PROCESSING...' : '確認送單'}
                  </Button>
                </div>
              </div>
            </div>
          </Card>

          {/* 下方：菜單區域 */}
          <Card className="flex-grow flex flex-col p-0 overflow-hidden border-[#1f1f25]">
            <div className="flex flex-col sm:flex-row justify-between p-4 bg-[#0a0a0c] border-b border-[#1f1f25] gap-4 z-10 flex-shrink-0">
              <div className="flex overflow-x-auto gap-2 hide-scrollbar pb-1 custom-scrollbar">
                <button onClick={() => setSelectedCategoryId('all')} className={`px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap ${selectedCategoryId === 'all' ? 'bg-red-600 text-white' : 'bg-[#121216] text-gray-400 hover:bg-[#1a1a1f] hover:text-white'}`}>全部</button>
                {[...categories].sort((a,b)=>a.sortOrder-b.sortOrder).map(c => (
                  <button key={c.id} onClick={() => setSelectedCategoryId(c.id)} className={`px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap ${selectedCategoryId === c.id ? 'bg-red-600 text-white' : 'bg-[#121216] text-gray-400 hover:bg-[#1a1a1f] hover:text-white'}`}>{c.name}</button>
                ))}
              </div>
              <Input icon={Search} placeholder="搜尋菜單..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full sm:w-64 flex-shrink-0" />
            </div>

            <div className="flex-grow overflow-y-auto p-4 custom-scrollbar bg-[#050505]">
              <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-5 gap-4">
                {displayItems.map(item => {
                  const mkQty = getMakableQty(item);
                  const outOfStock = mkQty !== null && mkQty <= 0;
                  return (
                    <button
                      key={item.id} onClick={() => updateCart(item, 1)}
                      className={`bg-[#121216] relative rounded-xl text-left overflow-hidden flex flex-col min-h-[130px] border ${
                        outOfStock ? 'border-red-900/50 opacity-60 cursor-not-allowed' : 'border-[#1f1f25] hover:border-red-900'
                      }`}
                    >
                      {/* Item Image Display */}
                      {item.imageUrl && (
                        <img 
                          src={item.imageUrl} 
                          alt={item.name} 
                          className="absolute inset-0 w-full h-full object-cover opacity-40 pointer-events-none" 
                          onError={(e) => e.target.style.display = 'none'}
                        />
                      )}
                      {item.imageUrl && <div className="absolute inset-0 bg-gradient-to-t from-[#050505] to-transparent pointer-events-none"></div>}

                      {/* Price Top Right */}
                      <div className={`absolute top-0 right-0 text-white text-xs font-black px-3 py-1 rounded-bl-xl shadow-md z-10 ${outOfStock ? 'bg-gray-600' : 'bg-red-600'}`}>
                        ${item.price}
                      </div>
                      
                      {/* Name and Qty Layout */}
                      <div className="relative z-10 p-3 flex flex-col h-full justify-between w-full">
                        <h3 className="font-bold text-gray-100 pr-10 text-base lg:text-lg leading-tight drop-shadow-md">{item.name}</h3>
                        
                        {/* Makable Qty Bottom Left */}
                        <div className="mt-3">
                          {mkQty !== null ? (
                            <div className={`text-xs font-bold px-2 py-1 rounded w-fit drop-shadow-md border ${outOfStock ? 'bg-red-950/80 text-red-400 border-red-900/50' : 'bg-black text-green-400 border-[#1f1f25]'}`}>
                              {outOfStock ? '庫存耗盡' : `可製作: ${mkQty} 份`}
                            </div>
                          ) : <div className="text-[10px] text-yellow-500 font-bold uppercase tracking-widest drop-shadow-md bg-black border border-[#1f1f25] px-2 py-1 rounded w-fit">無數量限制</div>}
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          </Card>
        </div>
      );
    };

    const OrdersView = () => {
      const { orders, warehouses, showAlert } = useAppContext();

      const handleCopyBill = (o) => {
        const whName = warehouses.find(w => w.id === o.warehouseId)?.name || '未指定倉庫';
        const text = `=== 鐵騎酒吧 帳單 ===\n時間: ${new Date(o.timestamp).toLocaleString()}\n桌號/客人: ${o.guestName}\n出餐庫存: ${whName}\n-------------------\n${o.items.map(i=>`${i.name} x${i.qty}  $${i.price*i.qty}`).join('\n')}\n-------------------\n小計: $${o.subtotal}\n折扣: -$${Math.round(o.discountAmount || 0)}\n總計: $${Math.round(o.total)}\n===================`;
        copyToClipboard(text);
        showAlert("📝 帳單文字已成功複製到剪貼簿！");
      };

      return (
        <Card>
          <h2 className="text-xl font-bold text-white mb-6 flex items-center gap-2"><ListOrdered className="text-blue-500"/> 記帳歷史紀錄</h2>
          <div className="overflow-x-auto custom-scrollbar border border-[#1f1f25] rounded-xl">
            <table className="w-full text-left border-collapse">
              <thead>
                <tr className="bg-[#0a0a0c] border-b border-[#1f1f25]">
                  <th className="p-4 text-gray-400 font-bold text-sm">時間</th>
                  <th className="p-4 text-gray-400 font-bold text-sm">桌號/客人</th>
                  <th className="p-4 text-gray-400 font-bold text-sm">明細</th>
                  <th className="p-4 text-gray-400 font-bold text-sm text-right">小計</th>
                  <th className="p-4 text-yellow-500/80 font-bold text-sm text-right">折扣</th>
                  <th className="p-4 text-red-400 font-bold text-sm text-right">實收</th>
                  <th className="p-4 text-gray-400 font-bold text-sm text-center">操作</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-[#1f1f25] bg-[#050505]">
                {orders.map(o => (
                  <tr key={o.id} className="hover:bg-[#121216]">
                    <td className="p-4 text-sm text-gray-400 font-mono">{new Date(o.timestamp).toLocaleString()}</td>
                    <td className="p-4 font-bold text-gray-200">
                      {o.guestName}
                      {o.warehouseId && <div className="text-[10px] text-gray-500 mt-1"><Warehouse size={10} className="inline mr-1"/>{warehouses.find(w=>w.id===o.warehouseId)?.name || '未知'}</div>}
                    </td>
                    <td className="p-4 text-sm text-gray-400 max-w-xs truncate" title={o.items.map(i=>`${i.name}x${i.qty}`).join(', ')}>{o.items.map(i => `${i.name}x${i.qty}`).join(', ')}</td>
                    <td className="p-4 text-right text-gray-400 font-mono">${o.subtotal}</td>
                    <td className="p-4 text-right text-yellow-500/80 font-mono">-{Math.round(o.discountAmount || 0)}</td>
                    <td className="p-4 text-right font-black text-red-400 font-mono">${Math.round(o.total)}</td>
                    <td className="p-4 text-center">
                      <button onClick={() => handleCopyBill(o)} className="text-gray-400 hover:text-white bg-[#121216] hover:bg-[#1a1a1f] p-2 rounded-lg border border-[#1f1f25]" title="複製帳單">
                        <Copy size={16}/>
                      </button>
                    </td>
                  </tr>
                ))}
                {orders.length === 0 && <tr><td colSpan="7" className="text-center p-10 text-gray-500 font-bold">尚無訂單紀錄</td></tr>}
              </tbody>
            </table>
          </div>
        </Card>
      );
    };

    const MenuManager = () => {
      const { categories, items, ingredients, showAlert, showConfirm, showEdit, logAction, systemConfig, ingredientMap, categoryMap } = useAppContext();
      const [activeTab, setActiveTab] = useState('items'); 
      const [searchQuery, setSearchQuery] = useState('');
      
      const [catName, setCatName] = useState('');
      const [itemData, setItemData] = useState({ name: '', price: '', cat: '', recipe: [], imageUrl: '' });
      const [ingSelection, setIngSelection] = useState({ id: '', qty: '' });
      const [editingItemId, setEditingItemId] = useState(null);

      const sortedCats = [...categories].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
      const sortedItems = [...items].sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0)).filter(i => i.name.toLowerCase().includes(searchQuery.toLowerCase()));

      const handleAction = async (action, logMsg) => {
        await action();
        if (logMsg) logAction(logMsg.split(':')[0], logMsg);
      };

      const addCat = () => {
        if (!catName.trim()) return;
        handleAction(async () => { await addDoc(getCollRef('bar_categories'), { name: catName, sortOrder: categories.length }); setCatName(''); }, `新增分類: ${catName}`);
      };

      const editCat = (cat) => showEdit({
        title: '編輯分類', fields: [{ key: 'name', label: '名稱', defaultValue: cat.name }],
        onSave: (v) => { if (v.name) handleAction(() => updateDoc(getDocRef('bar_categories', cat.id), { name: v.name }), `編輯分類: ${v.name}`); }
      });

      const delCat = (id, name) => showConfirm('確定刪除分類？', () => handleAction(() => deleteDoc(getDocRef('bar_categories', id)), `刪除分類: ${name}`));

      const saveItem = () => {
        if (!itemData.name || itemData.price === '' || itemData.price === null || itemData.price === undefined || !itemData.cat) return showAlert('填寫完整資訊 (分類、名稱、價格)');
        handleAction(async () => {
          const payload = {
            name: itemData.name, price: Number(itemData.price), categoryId: itemData.cat, 
            recipe: itemData.recipe, imageUrl: itemData.imageUrl || '' 
          };
          if (editingItemId) {
            await updateDoc(getDocRef('bar_items', editingItemId), payload);
          } else {
            await addDoc(getCollRef('bar_items'), { ...payload, sortOrder: items.length });
          }
          setItemData({ name: '', price: '', cat: '', recipe: [], imageUrl: '' });
          setEditingItemId(null);
        }, `${editingItemId ? '編輯' : '新增'}品項: ${itemData.name}`);
      };

      const startEditItem = (item) => {
        setItemData({
          name: item.name, price: item.price, cat: item.categoryId,
          recipe: item.recipe || [], imageUrl: item.imageUrl || ''
        });
        setEditingItemId(item.id);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const cancelEdit = () => {
        setItemData({ name: '', price: '', cat: '', recipe: [], imageUrl: '' });
        setEditingItemId(null);
      };

      const delItem = (id, name) => showConfirm('確定刪除品項？', () => handleAction(() => deleteDoc(getDocRef('bar_items', id)), `刪除品項: ${name}`));

      const reorder = async (collectionStr, list) => {
        list.forEach((item, idx) => { if(item.sortOrder !== idx) updateDoc(getDocRef(collectionStr, item.id), { sortOrder: idx }); });
      };

      return (
        <Card className="max-w-5xl mx-auto">
          <div className="flex border-b border-[#1f1f25] mb-6">
            <button onClick={() => setActiveTab('items')} className={`px-6 py-3 font-bold border-b-2 ${activeTab === 'items' ? 'border-red-500 text-red-500' : 'border-transparent text-gray-500 hover:text-gray-300'}`}>品項與配方管理</button>
            <button onClick={() => setActiveTab('categories')} className={`px-6 py-3 font-bold border-b-2 ${activeTab === 'categories' ? 'border-red-500 text-red-500' : 'border-transparent text-gray-500 hover:text-gray-300'}`}>大分類管理</button>
          </div>

          {activeTab === 'categories' && (
            <div>
              <div className="flex gap-3 mb-6 bg-[#0a0a0c] p-4 rounded-xl border border-[#1f1f25]">
                <Input value={catName} onChange={e=>setCatName(e.target.value)} placeholder="新分類名稱" className="flex-grow" />
                <Button onClick={addCat}><Plus size={18}/> 新增分類</Button>
              </div>
              <DraggableList items={sortedCats} onReorder={(l) => reorder('bar_categories', l)} renderItem={cat => (
                <div className="flex justify-between items-center w-full group">
                  <span className="font-bold text-white group-hover:text-red-400">{cat.name}</span>
                  <div className="flex gap-2">
                    <button onClick={() => editCat(cat)} className="text-gray-500 hover:text-yellow-500 p-2 bg-[#050505] rounded"><Edit size={16}/></button>
                    <button onClick={() => delCat(cat.id, cat.name)} className="text-gray-500 hover:text-red-500 p-2 bg-[#050505] rounded"><Trash2 size={16}/></button>
                  </div>
                </div>
              )}/>
            </div>
          )}

          {activeTab === 'items' && (
            <div>
              <div className={`p-5 rounded-xl border mb-6 shadow-inner transition-colors ${editingItemId ? 'bg-yellow-950/20 border-yellow-900/50' : 'bg-[#0a0a0c] border-[#1f1f25]'}`}>
                <h3 className={`text-sm font-bold mb-3 flex items-center gap-2 ${editingItemId ? 'text-yellow-500' : 'text-gray-400'}`}>
                  {editingItemId ? <Edit size={16}/> : <Plus size={16}/>} 
                  {editingItemId ? `正在編輯：${itemData.name}` : '新增品項與配方設定'}
                </h3>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                  <select value={itemData.cat} onChange={e=>setItemData({...itemData, cat: e.target.value})} className="bg-[#121216] border border-[#1f1f25] text-white px-3 py-2 rounded-lg focus:border-red-500">
                    <option value="" disabled>選擇分類...</option>
                    {sortedCats.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                  <Input value={itemData.name} onChange={e=>setItemData({...itemData, name: e.target.value})} placeholder="品項名稱 *" className="md:col-span-2" />
                  <Input type="number" value={itemData.price} onChange={e=>setItemData({...itemData, price: e.target.value})} placeholder="售價 $ *" />
                  <Input value={itemData.imageUrl} onChange={e=>setItemData({...itemData, imageUrl: e.target.value})} placeholder="餐點圖片網址 URL (選填，可留空)" icon={ImageIcon} className="md:col-span-4" />
                </div>
                
                <div className="border-t border-[#1f1f25] pt-4 bg-[#050505] p-4 rounded-lg">
                  <h4 className="text-xs font-bold text-yellow-500/80 mb-3 uppercase tracking-wider">綁定出餐扣除的食材庫存</h4>
                  <div className="flex flex-wrap md:flex-nowrap gap-3 mb-3">
                    <select value={ingSelection.id} onChange={e=>setIngSelection({...ingSelection, id: e.target.value})} className="flex-grow bg-[#121216] border border-[#1f1f25] text-white px-3 py-2 rounded-lg text-sm">
                      <option value="" disabled>選擇庫存食材...</option>
                      {ingredients.map(ig => <option key={ig.id} value={ig.id}>{ig.name} (本:${ig.cost})</option>)}
                    </select>
                    <Input type="number" value={ingSelection.qty} onChange={e=>setIngSelection({...ingSelection, qty: e.target.value})} placeholder="單次用量" className="w-24" />
                    <Button variant="outline" onClick={() => {
                      if(!ingSelection.id || !ingSelection.qty) return;
                      const ing = ingredients.find(i=>i.id===ingSelection.id);
                      setItemData(p => ({...p, recipe: [...p.recipe, { ingredientId: ing.id, name: ing.name, qty: Number(ingSelection.qty) }]}));
                      setIngSelection({id:'', qty:''});
                    }}>加入配方</Button>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    {itemData.recipe.map((r, i) => (
                      <div key={i} className="bg-[#121216] border border-[#1f1f25] rounded-md px-3 py-1 text-sm flex items-center gap-2 shadow-sm">
                        <span className="text-gray-200">{r.name} <span className="text-red-400 font-bold">x{r.qty}</span></span>
                        <button onClick={() => setItemData(p => ({...p, recipe: p.recipe.filter((_, idx)=>idx!==i)}))} className="text-gray-500 hover:text-red-400"><X size={14}/></button>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="flex justify-end gap-3 mt-4">
                  {editingItemId && <Button variant="outline" onClick={cancelEdit}>取消編輯</Button>}
                  <Button variant={editingItemId ? 'secondary' : 'primary'} onClick={saveItem} className="px-8">
                    {editingItemId ? '儲存配方更新' : '建立新菜單'}
                  </Button>
                </div>
              </div>

              <div className="flex justify-between items-end mb-4">
                <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider">拖曳左側可排序</h3>
                <Input icon={Search} placeholder="搜尋現有品項..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-64" />
              </div>
              
              <DraggableList items={sortedItems} onReorder={(l) => reorder('bar_items', l)} renderItem={item => {
                const cost = item.recipe && !systemConfig.ignoreAllCosts ? item.recipe.reduce((s, r) => s + ((ingredientMap[r.ingredientId]?.cost||0) * r.qty), 0) : 0;
                return (
                  <div className={`flex justify-between items-center w-full group ${editingItemId === item.id ? 'opacity-50' : ''}`}>
                    <div className="min-w-0 pr-4 flex items-center gap-3">
                      {item.imageUrl ? (
                        <img src={item.imageUrl} alt="" className="w-10 h-10 rounded object-cover border border-[#1f1f25] bg-[#050505]" onError={(e)=>e.target.style.display='none'}/>
                      ) : <div className="w-10 h-10 rounded bg-[#050505] border border-[#1f1f25] flex items-center justify-center text-gray-600"><ImageIcon size={18}/></div>}
                      <div>
                        <div className="flex items-center gap-2 mb-1">
                          <span className="font-bold text-white text-lg truncate group-hover:text-red-400">{item.name}</span>
                          <span className="text-[10px] bg-[#121216] text-gray-300 px-2 py-0.5 rounded-full border border-[#1f1f25] truncate">{categoryMap[item.categoryId]?.name || '未分類'}</span>
                        </div>
                        <div className="text-xs text-gray-500 truncate">
                          {item.recipe?.length > 0 ? item.recipe.map(r=>`${r.name}x${r.qty}`).join(' | ') : <span className="text-yellow-700 font-bold">無綁定配方</span>}
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-3 md:gap-5 text-sm flex-shrink-0">
                      <div className="text-right font-mono">
                        <p className="text-white font-bold">${item.price}</p>
                        <p className="text-red-400/80 text-xs text-right">本:${cost}</p>
                      </div>
                      <div className="flex gap-1 border-l border-[#1f1f25] pl-3">
                        <button onClick={() => startEditItem(item)} className="text-gray-500 hover:text-yellow-500 p-2 bg-[#050505] rounded"><Edit size={16}/></button>
                        <button onClick={() => delItem(item.id, item.name)} className="text-gray-500 hover:text-red-500 p-2 bg-[#050505] rounded"><Trash2 size={16}/></button>
                      </div>
                    </div>
                  </div>
                );
              }}/>
            </div>
          )}
        </Card>
      );
    };

    const DraggableList = ({ items, onReorder, renderItem }) => {
      const [draggedIdx, setDraggedIdx] = useState(null);
      const handleDrag = (e, idx, type) => {
        if(type === 'start') { setDraggedIdx(idx); e.dataTransfer.effectAllowed='move'; }
        if(type === 'enter' && draggedIdx !== null && draggedIdx !== idx) {
          const newItems = [...items];
          newItems.splice(idx, 0, newItems.splice(draggedIdx, 1)[0]);
          setDraggedIdx(idx); onReorder(newItems);
        }
        if(type === 'end') setDraggedIdx(null);
      };
      return <div className="space-y-2">{items.map((item, i) => (
        <div key={item.id} draggable onDragStart={e=>handleDrag(e,i,'start')} onDragEnter={e=>handleDrag(e,i,'enter')} onDragEnd={e=>handleDrag(e,i,'end')} onDragOver={e=>e.preventDefault()} className="flex items-stretch bg-[#121216] border border-[#1f1f25] rounded-xl group hover:border-[#2a2a30] shadow-sm">
          <div className="px-3 flex items-center bg-[#0a0a0c] border-r border-[#1f1f25] cursor-grab active:cursor-grabbing text-gray-600 hover:text-red-400 rounded-l-xl"><GripVertical size={18}/></div>
          <div className="flex-grow p-4 min-w-0">{renderItem(item)}</div>
        </div>
      ))}</div>;
    };

    const InventoryManager = () => {
      const { ingredients, items, warehouses, showAlert, showConfirm, showEdit, logAction, systemConfig, ingredientMap } = useAppContext();
      const [activeTab, setActiveTab] = useState('inventory'); 
      
      const [newIng, setNewIng] = useState({ name: '', cost: '', unitWeight: '', weightUnit: 'g', ignore: false });
      const [stockOp, setStockOp] = useState({ id: '', qty: '', totalSpent: '', reason: '日常進貨', warehouseId: warehouses[0]?.id || 'default' });
      const [isCustomReason, setIsCustomReason] = useState(false);
      
      const [calcItem, setCalcItem] = useState('');
      const [calcPortions, setCalcPortions] = useState(10);

      // --- Helper: 計算倉庫當前總重量 (以 kg 為單位) ---
      const getWarehouseUsageKg = (wId) => {
        let totalKg = 0;
        ingredients.forEach(ing => {
          const qty = getStockForWarehouse(ing, wId);
          if (qty > 0 && ing.unitWeight !== undefined && ing.unitWeight !== null) {
            let weightKg = Number(ing.unitWeight);
            if (ing.weightUnit === 'g' || ing.weightUnit === 'ml') weightKg = weightKg / 1000;
            totalKg += (qty * weightKg);
          }
        });
        return totalKg;
      };

      const addIng = async () => {
        if (!newIng.name || newIng.cost === '' || newIng.cost === null || newIng.cost === undefined) return showAlert("請填寫食材名稱與基礎成本");
        await addDoc(getCollRef('bar_ingredients'), { 
          name: newIng.name, 
          stock: 0, 
          cost: Number(newIng.cost), 
          unitWeight: (newIng.unitWeight !== '' && newIng.unitWeight !== null && newIng.unitWeight !== undefined) ? Number(newIng.unitWeight) : null,
          weightUnit: newIng.weightUnit,
          ignoreCost: newIng.ignore 
        });
        logAction('新增食材', `新增: ${newIng.name}`);
        setNewIng({ name: '', cost: '', unitWeight: '', weightUnit: 'g', ignore: false });
      };

      const addStock = async () => {
        if (!stockOp.id || !stockOp.qty) return showAlert("請選擇食材與變動數量");
        const ing = ingredients.find(i => i.id === stockOp.id);
        if (!ing) return;
        
        const qty = Number(stockOp.qty);
        const totalSpent = Number(stockOp.totalSpent);
        const inputUnitCost = (qty > 0 && stockOp.totalSpent !== '') ? (totalSpent / qty) : 0;
        
        const oldStock = ing.stock || 0;
