        const oldCost = ing.cost !== undefined ? ing.cost : 0;
        const newStockTotal = oldStock + qty;
        
        // 樓層/倉庫數量更新
        const oldStocksMap = ing.stocks || { default: oldStock };
        const targetWId = stockOp.warehouseId;
        const newStocksMap = { ...oldStocksMap, [targetWId]: (oldStocksMap[targetWId] || 0) + qty };
        
        // 【移動平均成本算法】
        let finalCost = oldCost;
        if (qty > 0 && inputUnitCost > 0 && newStockTotal > 0) {
          const totalOldVal = oldStock * oldCost;
          const totalNewVal = totalSpent;
          finalCost = Math.round((totalOldVal + totalNewVal) / newStockTotal);
        } else if (inputUnitCost > 0 && qty <= 0) {
          finalCost = inputUnitCost;
        }

        await updateDoc(getDocRef('bar_ingredients', ing.id), { stock: newStockTotal, stocks: newStocksMap, cost: finalCost });
        
        const whName = warehouses.find(w => w.id === targetWId)?.name || '未知倉庫';
        await addDoc(getCollRef('bar_inventory'), { 
          ingredientId: ing.id, ingredientName: ing.name, changeQty: qty, 
          reason: stockOp.reason || '無指定事由', costPerItem: inputUnitCost > 0 ? inputUnitCost : oldCost, 
          warehouseId: targetWId, timestamp: Date.now() 
        });
        
        let logMsg = `[${whName}] ${ing.name} ${qty > 0 ? '+' : ''}${qty} (事由: ${stockOp.reason})`;
        if (qty > 0 && totalSpent > 0) logMsg += ` / 公款扣除: $${totalSpent}`;
        logAction('庫存調整', logMsg);
        
        setStockOp({ id: '', qty: '', totalSpent: '', reason: isCustomReason ? '' : stockOp.reason, warehouseId: stockOp.warehouseId });
      };

      const editIng = (ing) => {
        const stockFields = warehouses.map(w => ({
          key: `stock_${w.id}`, type: 'number', label: `👉 [即時數量] ${w.name}`, defaultValue: getStockForWarehouse(ing, w.id)
        }));

        showEdit({
          title: '編輯食材設定與即時庫存',
          fields: [
            { key: 'name', label: '名稱', defaultValue: ing.name }, 
            { key: 'cost', type: 'number', label: '強制覆寫成本', defaultValue: ing.cost !== undefined ? ing.cost : 0 }, 
            { key: 'unitWeight', type: 'number', label: '單件重量/容量', defaultValue: (ing.unitWeight !== undefined && ing.unitWeight !== null) ? ing.unitWeight : '' },
            { key: 'weightUnit', type: 'select', label: '單位', defaultValue: ing.weightUnit || 'g', options: [{value:'g',label:'公克 (g)'},{value:'kg',label:'公斤 (kg)'},{value:'ml',label:'毫升 (ml)'},{value:'l',label:'公升 (L)'}] },
            { key: 'ignore', type: 'checkbox', label: '無視此成本', defaultValue: ing.ignoreCost||false },
            ...stockFields
          ],
          onSave: async (v) => { 
            // 精準判斷條件，避免 0 被當作 false 而被系統自動略過儲存動作
            if(v.name && v.cost !== '' && v.cost !== null && v.cost !== undefined) { 
              const newStocksMap = { ...(ing.stocks || { default: ing.stock || 0 }) };
              let newTotalStock = ing.stock || 0;
              const changes = [];

              // 計算各倉庫的庫存變動
              for (const w of warehouses) {
                const oldWStock = getStockForWarehouse(ing, w.id);
                const newWStock = v[`stock_${w.id}`] !== '' && v[`stock_${w.id}`] !== undefined ? Number(v[`stock_${w.id}`]) : 0;
                const diff = newWStock - oldWStock;
                
                if (diff !== 0) {
                  newStocksMap[w.id] = newWStock;
                  newTotalStock += diff;
                  changes.push({ warehouseId: w.id, warehouseName: w.name, diff });
                }
              }

              // 更新食材資料與總庫存
              await updateDoc(getDocRef('bar_ingredients', ing.id), { 
                name: String(v.name), 
                cost: Number(v.cost), 
                unitWeight: (v.unitWeight !== '' && v.unitWeight !== null && v.unitWeight !== undefined) ? Number(v.unitWeight) : null,
                weightUnit: v.weightUnit || 'g',
                ignoreCost: Boolean(v.ignore),
                stock: newTotalStock,
                stocks: newStocksMap
              }); 
              logAction('編輯食材', `更新 ${v.name}`); 

              // 如果有即時修改庫存，寫入歷史紀錄與操作日誌
              if (changes.length > 0) {
                const batch = writeBatch(db);
                changes.forEach(change => {
                  const invLogRef = doc(getCollRef('bar_inventory'));
                  batch.set(invLogRef, {
                    ingredientId: ing.id, ingredientName: v.name, changeQty: change.diff,
                    reason: '即時編輯', costPerItem: Number(v.cost),
                    warehouseId: change.warehouseId, timestamp: Date.now()
                  });
                  logAction('庫存調整', `[${change.warehouseName}] ${v.name} ${change.diff > 0 ? '+' : ''}${change.diff} (事由: 即時編輯)`);
                });
                await batch.commit();
              }
            } 
          }
        });
      };

      const deleteIng = (ing) => {
        showConfirm(`確定要永久刪除食材「${ing.name}」嗎？這將無法復原。`, async () => {
          await deleteDoc(getDocRef('bar_ingredients', ing.id));
          logAction('刪除食材', `刪除了: ${ing.name}`);
        });
      };

      const clearAllIngs = () => {
        if(ingredients.length === 0) return showAlert('目前沒有任何食材資料。');
        showConfirm('⚠️ 警告：確定要清空「所有」食材資料嗎？此操作將不可逆，會刪除所有建檔的食材與庫存資料！', () => {
          showConfirm('【最終危險確認】請再次確認，您真的要刪除全部食材庫存嗎？', async () => {
            const batch = writeBatch(db);
            ingredients.forEach(ing => batch.delete(getDocRef('bar_ingredients', ing.id)));
            await batch.commit();
            logAction('危險操作', '清空了所有食材資料');
            showAlert('已成功清空所有食材庫存紀錄。');
          });
        });
      };

      const selectedRecipeItem = useMemo(() => items.find(i => i.id === calcItem), [calcItem, items]);

      // 當前選擇倉庫的容量資訊計算
      const activeWarehouse = warehouses.find(w => w.id === stockOp.warehouseId);
      const activeUsageKg = activeWarehouse ? getWarehouseUsageKg(stockOp.warehouseId) : 0;
      const activeCapKg = activeWarehouse?.capacity || 0;
      const capPct = activeCapKg > 0 ? Math.min(100, (activeUsageKg / activeCapKg) * 100) : 0;
      const isOverCap = activeCapKg > 0 && activeUsageKg > activeCapKg;

      return (
        <div className="space-y-6">
          <div className="flex border-b border-[#1f1f25] mb-2 max-w-7xl mx-auto">
            <button onClick={() => setActiveTab('inventory')} className={`px-6 py-3 font-bold border-b-2 ${activeTab === 'inventory' ? 'border-red-500 text-red-500' : 'border-transparent text-gray-500 hover:text-gray-300'}`}>庫存進退貨</button>
            <button onClick={() => setActiveTab('calculator')} className={`px-6 py-3 font-bold border-b-2 flex items-center gap-2 ${activeTab === 'calculator' ? 'border-yellow-500 text-yellow-500' : 'border-transparent text-gray-500 hover:text-gray-300'}`}><Calculator size={16}/> 採購預測計算機</button>
          </div>

          {activeTab === 'inventory' && (
            <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 max-w-7xl mx-auto">
              <div className="xl:col-span-1 space-y-6">
                <Card className="border-[#1f1f25]">
                  <h2 className="text-lg font-bold text-white mb-4 border-b border-[#1f1f25] pb-2"><span className="text-red-500 font-black pr-2">1.</span>建立新食材種類</h2>
                  <div className="space-y-4">
                    <Input value={newIng.name} onChange={e=>setNewIng({...newIng,name:e.target.value})} placeholder="食材名稱 (例: 伏特加)" />
                    <Input type="number" value={newIng.cost} onChange={e=>setNewIng({...newIng,cost:e.target.value})} placeholder="初始單件成本 $" />
                    
                    <div className="flex gap-2">
                      <Input type="number" value={newIng.unitWeight} onChange={e=>setNewIng({...newIng,unitWeight:e.target.value})} placeholder="單件重量/容量 (選填)" className="flex-grow" />
                      <select value={newIng.weightUnit} onChange={e=>setNewIng({...newIng, weightUnit: e.target.value})} className="w-28 bg-[#050505] border border-[#1f1f25] text-white px-2 py-2 rounded-sm focus:outline-none focus:border-red-700 text-sm font-bold">
                        <option value="g">公克 (g)</option>
                        <option value="kg">公斤 (kg)</option>
                        <option value="ml">毫升 (ml)</option>
                        <option value="l">公升 (L)</option>
                      </select>
                    </div>

                    <label className="flex items-center gap-2 p-2 bg-[#050505] rounded-lg cursor-pointer text-sm text-gray-300 border border-[#1f1f25]">
                      <input type="checkbox" checked={newIng.ignore} onChange={e=>setNewIng({...newIng,ignore:e.target.checked})} className="w-4 h-4 accent-red-600"/>
                      暫時不計算此成本
                    </label>
                    <Button onClick={addIng} className="w-full">建立食材</Button>
                  </div>
                </Card>

                <Card className="border-red-900/30 shadow-[0_0_20px_rgba(220,38,38,0.05)]">
                  <h2 className="text-lg font-bold text-white mb-4 border-b border-[#1f1f25] pb-2"><span className="text-red-500 font-black pr-2">2.</span>進出貨與公帳扣除作業</h2>
                  <div className="space-y-4">
                    <div className="flex items-center gap-2 mb-2 bg-[#121216] p-2 rounded-lg border border-[#1f1f25]">
                      <Warehouse size={16} className="text-gray-400" />
                      <select value={stockOp.warehouseId} onChange={e=>setStockOp({...stockOp, warehouseId: e.target.value})} className="w-full bg-transparent text-white focus:outline-none font-bold text-sm">
                        {warehouses.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}
                      </select>
                    </div>

                    {/* 倉庫容量指示器 */}
                    {activeWarehouse && (
                      <div className="mb-2 bg-[#050505] p-3 rounded-lg border border-[#1f1f25]">
                        <div className="flex justify-between items-end text-xs font-bold text-gray-400 mb-1.5">
                          <span>目前重量/容量: <span className={isOverCap ? 'text-red-400' : 'text-gray-200'}>{activeUsageKg.toFixed(2)}</span> kg</span>
                          <span>{activeCapKg > 0 ? `上限: ${activeCapKg} kg` : '無容量上限'}</span>
                        </div>
                        {activeCapKg > 0 && (
                          <div className="w-full bg-[#1a1a1f] rounded-full h-1.5 overflow-hidden">
                            <div className={`h-full ${isOverCap ? 'bg-red-500' : 'bg-green-500'}`} style={{ width: `${capPct}%` }}></div>
                          </div>
                        )}
                        {isOverCap && <div className="text-[10px] text-red-500 mt-1.5 flex items-center gap-1"><AlertTriangle size={10}/> 已超出設定倉庫容量，請評估是否能容納！</div>}
                      </div>
                    )}
                    
                    <select value={stockOp.id} onChange={e=>setStockOp({...stockOp,id:e.target.value})} className="w-full bg-[#121216] border border-[#1f1f25] text-white px-3 py-2 rounded-lg focus:border-red-500">
                      <option value="" disabled>請選擇要進退貨的食材...</option>
                      {[...ingredients].sort((a,b)=>a.name.localeCompare(b.name)).map(i => {
                        const wStock = getStockForWarehouse(i, stockOp.warehouseId);
                        return <option key={i.id} value={i.id}>{i.name} (所選庫存: {wStock})</option>
                      })}
                    </select>
                    
                    <div className="flex gap-2">
                      <Input type="number" value={stockOp.qty} onChange={e=>setStockOp({...stockOp,qty:e.target.value})} placeholder="數量 (+/-)" className="w-1/2" />
                      <Input type="number" value={stockOp.totalSpent} onChange={e=>setStockOp({...stockOp,totalSpent:e.target.value})} placeholder="總花費(公款) $" className="w-1/2" />
                    </div>
                    {Number(stockOp.qty) > 0 && stockOp.totalSpent !== '' && (
                      <div className="text-xs text-yellow-500 font-bold bg-yellow-950/20 p-2 rounded border border-yellow-900/50">
                        系統自動結算本次單位成本: ${(Number(stockOp.totalSpent) / Number(stockOp.qty)).toFixed(2)} / 件
                      </div>
                    )}

                    {/* 變動事由標籤區塊 */}
                    <div className="flex flex-col gap-2 pt-2 border-t border-[#1f1f25]">
                      <label className="text-xs text-gray-500 font-bold uppercase tracking-wider flex items-center gap-1"><Tag size={12}/> 變動事由</label>
                      <div className="flex flex-wrap gap-2">
                        {['日常進貨', '營業消耗', '退貨/報廢', '贊助食材'].map(tag => (
                          <button
                            key={tag}
                            onClick={() => { setStockOp({...stockOp, reason: tag}); setIsCustomReason(false); }}
                            className={`px-3 py-1.5 text-xs font-bold rounded-md border transition-colors ${!isCustomReason && stockOp.reason === tag ? 'bg-red-900/50 text-red-400 border-red-700/50' : 'bg-[#050505] text-gray-400 border-[#1f1f25] hover:border-gray-500'}`}
                          >
                            {tag}
                          </button>
                        ))}
                        <button
                          onClick={() => { setIsCustomReason(true); setStockOp({...stockOp, reason: ''}); }}
                          className={`px-3 py-1.5 text-xs font-bold rounded-md border transition-colors ${isCustomReason ? 'bg-red-900/50 text-red-400 border-red-700/50' : 'bg-[#050505] text-gray-400 border-[#1f1f25] hover:border-gray-500'}`}
                        >
                          ✎ 自訂輸入...
                        </button>
                      </div>
                      {isCustomReason && (
                        <Input value={stockOp.reason} onChange={e=>setStockOp({...stockOp,reason:e.target.value})} placeholder="請手動輸入變動事由" className="mt-1" />
                      )}
                    </div>

                    <Button onClick={addStock} variant="secondary" className="w-full shadow-md mt-2">送出變動並記錄公帳</Button>
                  </div>
                </Card>
              </div>

              <Card className="xl:col-span-2 border-[#1f1f25] p-0 overflow-hidden flex flex-col">
                <div className="flex justify-between items-center p-5 border-b border-[#1f1f25] bg-[#0a0a0c]">
                  <h2 className="text-lg font-bold text-white">當前食材庫存狀態</h2>
                  <Button variant="danger" onClick={clearAllIngs} className="text-xs px-3 py-1 shadow-md border-red-800"><Trash2 size={14}/> 刪除全部食材</Button>
                </div>
                <div className="overflow-y-auto flex-grow custom-scrollbar">
                  <table className="w-full text-left">
                    <thead className="bg-[#0a0a0c] sticky top-0 z-10 text-xs uppercase tracking-wider text-gray-500 font-bold border-b border-[#1f1f25]">
                      <tr>
                        <th className="p-4 border-b border-[#1f1f25]">食材名稱</th>
                        <th className="p-4 border-b border-[#1f1f25]">庫存餘額 (各區)</th>
                        <th className="p-4 border-b border-[#1f1f25] text-right">單位均價</th>
                        <th className="p-4 border-b border-[#1f1f25] text-right">總庫存價值</th>
                        <th className="p-4 border-b border-[#1f1f25] text-center">操作</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-[#1f1f25] bg-[#050505] font-mono text-sm">
                      {[...ingredients].sort((a,b)=>a.name.localeCompare(b.name)).map(ing => {
                        const totalStock = ing.stock || 0;
                        const isLow = totalStock <= 5;
                        const ignore = systemConfig.ignoreAllCosts || ing.ignoreCost;
                        return (
                          <tr key={ing.id} className={`hover:bg-[#121216] ${isLow ? 'bg-red-950/20' : ''}`}>
                            <td className="p-4 font-bold text-gray-200 font-sans flex items-center gap-2">
                              {isLow && <AlertTriangle size={14} className="text-red-500"/>} {ing.name}
                            </td>
                            <td className="p-4">
                              <div className={`font-black mb-1 flex items-baseline gap-2 ${isLow ? 'text-red-400' : 'text-green-400'}`}>
                                <span>總量: {totalStock}</span>
                                {ing.unitWeight !== undefined && ing.unitWeight !== null && (
                                  <span className="text-xs font-normal text-gray-500">
                                    總重: {(totalStock * ing.unitWeight).toLocaleString()} {ing.weightUnit}
                                  </span>
                                )}
                              </div>
                              <div className="flex flex-wrap gap-1 text-[10px] text-gray-400">
                                {warehouses.map(w => {
                                  const wStock = getStockForWarehouse(ing, w.id);
                                  if (wStock <= 0) return null;
                                  return (
                                    <span key={w.id} className="bg-[#121216] border border-[#1f1f25] px-1.5 py-0.5 rounded flex items-center gap-1">
                                      {w.name}: {wStock}
                                      {ing.unitWeight !== undefined && ing.unitWeight !== null && <span className="text-gray-600">({(wStock * ing.unitWeight).toLocaleString()}{ing.weightUnit})</span>}
                                    </span>
                                  );
                                })}
                              </div>
                            </td>
                            <td className="p-4 text-right text-gray-400">
                              {ignore ? <span className="line-through text-gray-600">${ing.cost !== undefined ? ing.cost : 0}</span> : `$${ing.cost !== undefined ? ing.cost : 0}`}
                            </td>
                            <td className="p-4 text-right font-bold text-yellow-500/80">{ignore ? '$0' : `$${totalStock * (ing.cost !== undefined ? ing.cost : 0)}`}</td>
                            <td className="p-4 text-center">
                              <div className="flex justify-center gap-1">
                                <button onClick={() => editIng(ing)} className="text-gray-500 hover:text-yellow-400 bg-[#0a0a0c] p-2 rounded" title="編輯"><Edit size={16}/></button>
                                <button onClick={() => deleteIng(ing)} className="text-gray-500 hover:text-red-500 bg-[#0a0a0c] p-2 rounded" title="刪除"><Trash2 size={16}/></button>
                              </div>
                            </td>
                          </tr>
                      )})}
                      {ingredients.length === 0 && <tr><td colSpan="5" className="text-center p-10 text-gray-500 font-sans">尚無庫存資料</td></tr>}
                    </tbody>
                  </table>
                </div>
              </Card>
            </div>
          )}

          {activeTab === 'calculator' && (
            <div className="max-w-4xl mx-auto">
              <Card className="border-yellow-600/30 shadow-[0_0_30px_rgba(234,179,8,0.1)] relative overflow-hidden">
                <div className="absolute top-[-50px] right-[-50px] opacity-5 text-yellow-500 pointer-events-none"><Calculator size={250}/></div>
                <div className="relative z-10">
                  <h2 className="text-2xl font-black text-white mb-2 flex items-center gap-3"><Calculator className="text-yellow-500"/> 採購需求預測</h2>
                  <p className="text-gray-400 text-sm mb-6">選擇特定菜單品項，並輸入預計要銷售的份數，系統將展開配方並幫您計算所需採購的食材與初估花費。</p>

                  <div className="flex flex-col md:flex-row gap-4 mb-8 bg-[#0a0a0c] p-4 rounded-xl border border-[#1f1f25]">
                    <div className="flex-grow">
                      <label className="block text-xs text-gray-500 uppercase font-bold mb-1 tracking-wider">目標品項 Target Item</label>
                      <select value={calcItem} onChange={e=>setCalcItem(e.target.value)} className="w-full bg-[#121216] border border-[#1f1f25] text-white px-4 py-3 rounded-lg focus:border-yellow-500 text-lg font-bold">
                        <option value="">-- 請選擇品項 --</option>
                        {[...items].filter(i=>i.recipe?.length>0).sort((a,b)=>a.name.localeCompare(b.name)).map(i => <option key={i.id} value={i.id}>{i.name}</option>)}
                      </select>
                    </div>
                    <div className="w-full md:w-48">
                      <label className="block text-xs text-gray-500 uppercase font-bold mb-1 tracking-wider">目標份數 Portions</label>
                      <Input type="number" value={calcPortions} onChange={e=>setCalcPortions(Math.max(1, e.target.value))} className="w-full text-center text-lg font-bold" />
                    </div>
                  </div>

                  {selectedRecipeItem ? (
                    <div className="bg-[#050505] rounded-xl border border-[#1f1f25] overflow-hidden">
                      <div className="p-4 bg-[#0a0a0c] border-b border-[#1f1f25] flex justify-between items-center">
                        <h3 className="font-bold text-gray-200 text-lg">{selectedRecipeItem.name} <span className="text-sm font-normal text-gray-400">x {calcPortions} 份的食材拆解</span></h3>
                      </div>
                      <table className="w-full text-left text-sm font-mono">
                        <thead className="bg-[#050505] text-gray-500 text-xs uppercase tracking-widest border-b border-[#1f1f25]">
                          <tr>
                            <th className="p-3 pl-5 border-b border-[#1f1f25] font-sans font-bold">所需食材</th>
                            <th className="p-3 border-b border-[#1f1f25] text-right">需求總量</th>
                            <th className="p-3 border-b border-[#1f1f25] text-right">總庫存</th>
                            <th className="p-3 border-b border-[#1f1f25] text-right text-red-400 bg-red-950/20">缺口數量</th>
                            <th className="p-3 pr-5 border-b border-[#1f1f25] text-right text-yellow-500 bg-yellow-950/20">預估採購額</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-[#1f1f25] bg-[#050505]">
                          {selectedRecipeItem.recipe.map(req => {
                            const ing = ingredientMap[req.ingredientId];
                            const requiredQty = req.qty * calcPortions;
                            const currentStock = ing ? (ing.stock || 0) : 0;
                            const shortage = Math.max(0, requiredQty - currentStock);
                            const estCost = shortage * (ing?.cost || 0);
                            return (
                              <tr key={req.ingredientId} className="hover:bg-[#121216]">
                                <td className="p-3 pl-5 font-sans text-gray-300 font-bold">{req.name} <span className="text-[10px] text-gray-600 bg-[#0a0a0c] px-1 rounded ml-1">配方:x{req.qty}</span></td>
                                <td className="p-3 text-right text-white">{requiredQty}</td>
                                <td className="p-3 text-right text-green-400">{currentStock}</td>
                                <td className="p-3 text-right font-black text-red-500 bg-red-950/10">{shortage > 0 ? shortage : '-'}</td>
                                <td className="p-3 pr-5 text-right font-bold text-yellow-500 bg-yellow-950/10">${estCost}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot className="bg-[#0a0a0c] border-t-2 border-[#1f1f25]">
                          <tr>
                            <td colSpan="4" className="p-4 text-right font-sans font-black text-gray-400">總計預估採購預算：</td>
                            <td className="p-4 pr-5 text-right font-black text-yellow-400 text-lg">
                              ${selectedRecipeItem.recipe.reduce((sum, req) => {
                                const ing = ingredientMap[req.ingredientId];
                                const shortage = Math.max(0, (req.qty * calcPortions) - (ing?.stock || 0));
                                return sum + (shortage * (ing?.cost || 0));
                              }, 0)}
                            </td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  ) : (
                    <div className="text-center p-10 border border-[#1f1f25] border-dashed rounded-xl text-gray-600 bg-[#050505]">
                      <Calculator size={48} className="mx-auto mb-3 opacity-20" />
                      <p>請於上方選單指定擁有配方的品項</p>
                    </div>
                  )}
                </div>
              </Card>
            </div>
          )}
        </div>
      );
    };

    const ActivityManager = () => {
      const { activities, showAlert, showConfirm, showEdit, logAction } = useAppContext();
      const [actData, setActData] = useState({ name: '', type: 'percent', value: '', start: '', end: '' });

      const add = async () => {
        if (!actData.name || actData.value === '' || actData.value === null || !actData.start || !actData.end) return showAlert("請填寫完整");
        await addDoc(getCollRef('bar_activities'), { name: actData.name, type: actData.type, value: Number(actData.value), startTime: new Date(actData.start).toISOString(), endTime: new Date(actData.end).toISOString(), isActive: true });
        logAction('新增活動', `新增: ${actData.name}`); setActData({name:'', type:'percent', value:'', start:'', end:''});
      };

      const edit = (act) => showEdit({
        title: '編輯活動', fields: [ { key: 'name', label: '活動名稱', defaultValue: act.name }, { key: 'type', label: '類型', type: 'select', defaultValue: act.type, options: [{value:'percent', label:'打折(%)'}, {value:'amount', label:'折抵現金($)'}] }, { key: 'value', type: 'number', label: '數值', defaultValue: act.value }, { key: 's', type: 'datetime-local', label: '開始', defaultValue: toLocalDatetime(act.startTime) }, { key: 'e', type: 'datetime-local', label: '結束', defaultValue: toLocalDatetime(act.endTime) } ],
        onSave: (v) => { if(v.name && v.value !== '' && v.value !== null) { updateDoc(getDocRef('bar_activities', act.id), { name: v.name, type: v.type, value: Number(v.value), startTime: new Date(v.s).toISOString(), endTime: new Date(v.e).toISOString()}); logAction('編輯活動', v.name); } }
      });

      const toggle = (act) => { updateDoc(getDocRef('bar_activities', act.id), { isActive: !act.isActive }); logAction('切換狀態', `${act.name} -> ${!act.isActive}`); };
      const del = (id, name) => showConfirm("確定刪除活動？", () => { deleteDoc(getDocRef('bar_activities', id)); logAction('刪除活動', name); });

      const now = new Date().toISOString();

      return (
        <div className="space-y-6 max-w-7xl mx-auto">
          <Card className="border-[#1f1f25]">
            <h2 className="text-xl font-bold text-white mb-5 flex items-center gap-2"><Zap className="text-yellow-500"/> 新增活動優惠</h2>
            <div className="grid grid-cols-1 md:grid-cols-6 gap-4 items-end bg-[#050505] p-4 rounded-xl border border-[#1f1f25]">
              <div className="md:col-span-2"><Input value={actData.name} onChange={e=>setActData({...actData,name:e.target.value})} placeholder="活動名稱 (例: 歡樂時光)" /></div>
              <div className="md:col-span-1"><select value={actData.type} onChange={e=>setActData({...actData,type:e.target.value})} className="w-full bg-[#121216] border border-[#1f1f25] text-white px-3 py-2 rounded-lg"><option value="percent">打折(%)</option><option value="amount">折抵($)</option></select></div>
              <div className="md:col-span-1"><Input type="number" value={actData.value} onChange={e=>setActData({...actData,value:e.target.value})} placeholder="數值" /></div>
              <div className="md:col-span-1"><Input type="datetime-local" value={actData.start} onChange={e=>setActData({...actData,start:e.target.value})} className="text-sm px-2"/></div>
              <div className="md:col-span-1"><Input type="datetime-local" value={actData.end} onChange={e=>setActData({...actData,end:e.target.value})} className="text-sm px-2"/></div>
            </div>
            <Button onClick={add} className="mt-4 shadow-lg"><Plus size={18}/> 建立檔期</Button>
          </Card>

          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            {activities.map(act => {
              const ongoing = act.startTime <= now && act.endTime >= now, past = act.endTime < now, future = act.startTime > now;
              let sColor = "text-gray-500", sText = "已結束";
              if (act.isActive && ongoing) { sColor = "text-green-500 drop-shadow-[0_0_5px_#22c55e]"; sText = "進行中"; }
              else if (act.isActive && future) { sColor = "text-yellow-500"; sText = "未開始"; }
              else if (!act.isActive) { sColor = "text-red-500"; sText = "已停用"; }

              return (
                <Card key={act.id} className={`border-l-4 ${act.isActive && ongoing ? 'border-l-green-500 shadow-[0_0_15px_rgba(34,197,94,0.1)]' : 'border-l-gray-600'} relative p-5`}>
                  <div className="absolute top-4 right-4 flex gap-1">
                    <button onClick={() => edit(act)} className="p-2 hover:bg-[#121216] text-gray-400 hover:text-white rounded-lg"><Edit size={16}/></button>
                    <button onClick={() => toggle(act)} className="p-2 hover:bg-[#121216] text-gray-400 rounded-lg">{act.isActive ? <Square size={16} className="text-red-400"/> : <Play size={16} className="text-green-400"/>}</button>
                    <button onClick={() => del(act.id, act.name)} className="p-2 hover:bg-[#121216] text-gray-400 hover:text-red-500 rounded-lg"><Trash2 size={16}/></button>
                  </div>
                  <h3 className="text-lg font-black text-white pr-24 mb-1">{act.name}</h3>
                  <p className={`text-sm font-black mb-4 tracking-widest ${sColor}`}>{sText}</p>
                  <div className="text-sm bg-[#050505] p-3 rounded-lg border border-[#1f1f25] shadow-inner">
                    <p className="font-mono text-gray-400 mb-2">Benefit: <span className="text-yellow-400 font-bold text-base">{act.type === 'percent' ? `${act.value}% 折扣` : `-$${act.value}`}</span></p>
                    <p className="text-xs text-gray-500 flex items-center gap-2"><span className="w-1.5 h-1.5 bg-green-500 rounded-full"></span> {new Date(act.startTime).toLocaleString()}</p>
                    <p className="text-xs text-gray-500 flex items-center gap-2 mt-1"><span className="w-1.5 h-1.5 bg-red-500 rounded-full"></span> {new Date(act.endTime).toLocaleString()}</p>
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      );
    };

    const RoleManager = () => {
      const { roles, showAlert, showConfirm, logAction } = useAppContext();
      const [newRole, setNewRole] = useState('');
      const [editing, setEditing] = useState(null);

      const add = async () => {
        if(!newRole.trim()) return showAlert("請輸入名稱");
        if(roles.find(r=>r.name===newRole)) return showAlert("已存在");
        const p = PERMISSION_LIST.reduce((a, c) => ({ ...a, [c.id]: c.id==='dashboard' }), {});
        await addDoc(getCollRef('bar_roles'), { name: newRole, permissions: p, isSystem: false });
        logAction('新增職位', newRole); setNewRole('');
      };

      const saveEdit = async () => {
        if(!editing.name.trim()) return showAlert("名稱不可為空");
        await updateDoc(getDocRef('bar_roles', editing.id), { name: editing.name, permissions: editing.permissions });
        logAction('編輯權限', editing.name); setEditing(null);
      };

      const del = (id, name) => showConfirm(`確定刪除「${name}」？`, async () => { await deleteDoc(getDocRef('bar_roles', id)); logAction('刪除職位', name); });

      return (
        <div className="space-y-6 max-w-7xl mx-auto">
          {editing && (
            <Card className="border-yellow-500/50 shadow-[0_0_20px_rgba(234,179,8,0.15)] mb-6">
              <h2 className="text-xl font-bold text-yellow-500 mb-4 flex items-center gap-2"><Shield size={20} /> 編輯權限矩陣 - {editing.name}</h2>
              <Input value={editing.name} onChange={e=>setEditing({...editing, name: e.target.value})} disabled={editing.isSystem} className="max-w-sm mb-4" />
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 mb-6 bg-[#050505] p-4 rounded-xl border border-[#1f1f25]">
                {PERMISSION_LIST.map(p => (
                  <label key={p.id} className={`flex items-center gap-2 p-3 rounded-lg border cursor-pointer ${editing.permissions[p.id] ? 'bg-red-950/20 border-red-600 shadow-[0_0_10px_rgba(220,38,38,0.1)]' : 'bg-[#121216] border-[#1f1f25] hover:bg-[#1a1a1f]'}`}>
                    <input type="checkbox" checked={editing.permissions[p.id]||false} onChange={e=>setEditing({...editing, permissions: {...editing.permissions, [p.id]: e.target.checked}})} className="w-4 h-4 accent-red-600"/>
                    <span className={`text-sm font-bold ${editing.permissions[p.id] ? 'text-red-400' : 'text-gray-400'}`}>{p.label}</span>
                  </label>
                ))}
              </div>
              <div className="flex gap-3"><Button variant="secondary" onClick={saveEdit}>部署更新</Button><Button variant="outline" onClick={()=>setEditing(null)}>放棄</Button></div>
            </Card>
          )}

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <Card className="xl:col-span-1 h-fit">
              <h2 className="text-xl font-bold text-white mb-4">註冊新職位</h2>
              <Input value={newRole} onChange={e=>setNewRole(e.target.value)} placeholder="例: 實習生、會計" className="mb-4" />
              <Button onClick={add} className="w-full">建立模組</Button>
            </Card>
            <Card className="xl:col-span-2">
              <h2 className="text-xl font-bold text-white mb-6">系統授權等級列表</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {roles.map(r => (
                  <div key={r.id} className="bg-[#121216] border border-[#1f1f25] p-4 rounded-xl flex flex-col group hover:border-[#33333b]">
                    <div className="flex justify-between items-start mb-3">
                      <div className="flex items-center gap-2"><span className="font-bold text-lg text-white">{r.name}</span>{r.isSystem && <span className="bg-red-950/50 text-red-300 text-[10px] px-2 py-0.5 rounded border border-red-900 tracking-widest uppercase">SYS-LOCK</span>}</div>
                      <div className="flex gap-1">
                        <button onClick={()=>setEditing(r)} className="p-2 hover:bg-[#1a1a1f] text-gray-500 hover:text-yellow-400 rounded"><Edit size={16}/></button>
                        {!r.isSystem && <button onClick={()=>del(r.id, r.name)} className="p-2 hover:bg-[#1a1a1f] text-gray-500 hover:text-red-500 rounded"><Trash2 size={16}/></button>}
                      </div>
                    </div>
                    <div className="flex flex-wrap gap-1.5">
                      {PERMISSION_LIST.filter(p=>r.permissions[p.id]).map(p=><span key={p.id} className="bg-[#050505] border border-[#1f1f25] px-2 py-0.5 rounded text-xs text-gray-400">{p.label}</span>)}
                      {Object.values(r.permissions||{}).every(v=>!v) && <span className="text-red-500 text-xs font-bold bg-red-950/20 px-2 py-0.5 rounded">RESTRICTED - 無存取權限</span>}
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        </div>
      );
    };

    const UserManager = () => {
      const { users, roles, showAlert, showConfirm, showEdit, logAction } = useAppContext();
      const [data, setData] = useState({ name: '', pwd: '', role: '' });
      
      useEffect(() => { if(roles.length && !data.role) setData(d => ({...d, role: roles[0].id})); }, [roles]);

      const add = async () => {
        if(!data.name||!data.pwd||!data.role) return showAlert("請填寫完整");
        if(users.find(u=>u.name===data.name)) return showAlert("已存在");
        await addDoc(getCollRef('bar_users'), { name: data.name, password: data.pwd, role: data.role, isOnline: false, lastActive: 0 });
        logAction('新增帳號', data.name); setData({name:'', pwd:'', role: roles[0].id});
      };

      const edit = (u) => {
        const isSys = u.name === '花大熊';
        showEdit({
          title: isSys ? '編輯核心管理員' : '更新帳號配置',
          fields: isSys ? [{ key: 'p', label: '安全密碼', defaultValue: u.password }] : [ { key: 'n', label: '名稱', defaultValue: u.name }, { key: 'p', label: '密碼', defaultValue: u.password }, { key: 'r', label: '職位', type: 'select', defaultValue: u.role, options: roles.map(r=>({value:r.id, label:r.name})) } ],
          onSave: (v) => { if(v.n && v.n!==u.name && users.find(x=>x.name===v.n)) return showAlert("名稱重複"); updateDoc(getDocRef('bar_users', u.id), isSys ? {password:v.p} : {name:v.n, password:v.p, role:v.r}); logAction('更新帳號', u.name); }
        });
      };
      const del = (id, n) => { if(n==='花大熊')return showAlert("拒絕存取：無法刪除核心帳號"); showConfirm(`刪除 ${n}?`, () => { deleteDoc(getDocRef('bar_users', id)); logAction('刪除帳號', n); }); };

      return (
        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 max-w-7xl mx-auto">
          <Card className="lg:col-span-1 h-fit border-t-4 border-t-red-600 shadow-[0_0_20px_rgba(220,38,38,0.1)]">
            <h2 className="text-xl font-bold text-red-500 mb-6 flex items-center gap-2"><Users size={20}/> 分發新終端帳號</h2>
            <div className="space-y-4">
              <Input value={data.name} onChange={e=>setData({...data,name:e.target.value})} placeholder="人員代號 (帳號)" />
              <Input value={data.pwd} onChange={e=>setData({...data,pwd:e.target.value})} placeholder="初始密碼" />
              <select value={data.role} onChange={e=>setData({...data,role:e.target.value})} className="w-full bg-[#121216] border border-[#1f1f25] text-white px-3 py-2 rounded-lg"><option value="" disabled>指派職位...</option>{roles.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}</select>
              <Button onClick={add} className="w-full mt-2">註冊實體</Button>
            </div>
          </Card>
          <Card className="lg:col-span-2">
            <h2 className="text-xl font-bold text-white mb-6">活躍連線實體列表</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {users.map(u => (
                <div key={u.id} className="bg-[#121216] border border-[#1f1f25] p-4 rounded-xl flex justify-between items-center group hover:border-[#33333b] shadow-inner">
                  <div className="min-w-0 pr-2">
                    <div className="flex items-center gap-2 mb-2"><span className="font-bold text-lg text-white truncate">{u.name}</span>{(u.role==='admin_role'||u.role==='admin') && <Zap size={14} className="text-yellow-500 fill-yellow-500 drop-shadow-[0_0_5px_#eab308]"/>}</div>
                    <div className="text-xs text-gray-500 flex flex-col gap-1 font-mono">
                      <span>ROLE: <span className="text-gray-300 bg-[#050505] border border-[#1f1f25] px-1 rounded">{roles.find(r=>r.id===u.role)?.name || u.role}</span></span>
                      <span>PASS: <span className="text-gray-600 select-all">{u.password}</span></span>
                    </div>
                  </div>
                  <div className="flex flex-col gap-1 flex-shrink-0">
                    <button onClick={()=>edit(u)} className="p-2 bg-[#0a0a0c] hover:bg-yellow-950/20 text-gray-400 hover:text-yellow-500 rounded-lg"><Edit size={16}/></button>
                    {u.name!=='花大熊' && <button onClick={()=>del(u.id, u.name)} className="p-2 bg-[#0a0a0c] hover:bg-red-950/40 text-gray-400 hover:text-red-500 rounded-lg"><Trash2 size={16}/></button>}
                  </div>
                </div>
              ))}
            </div>
          </Card>
        </div>
      );
    };

    const SettingsView = () => {
      const { users, roles, categories, items, activities, orders, inventoryLogs, ingredients, operationLogs, settingsData, logAction, systemConfig, showAlert, showConfirm, showEdit, warehouses } = useAppContext();
      const allData = { bar_users: users, bar_roles: roles, bar_categories: categories, bar_items: items, bar_activities: activities, bar_orders: orders, bar_inventory: inventoryLogs, bar_ingredients: ingredients, bar_operation_logs: operationLogs };
      
      const [activeTab, setActiveTab] = useState('preferences');
      const [isImporting, setIsImporting] = useState(false);
      const [importStatus, setImportStatus] = useState('');
      const fileInputRef = useRef(null);
      const [exportConfig, setExportConfig] = useState(Object.keys(COLL_NAMES_MAP).reduce((a, k) => ({ ...a, [k]: true }), {}));
      const [pendingImport, setPendingImport] = useState(null);
      const [importConfig, setImportConfig] = useState({});

      const [newWhName, setNewWhName] = useState('');
      const [newWhCapacity, setNewWhCapacity] = useState('');

      const handleExport = () => {
        const fd = {}; Object.keys(exportConfig).forEach(k => { if(exportConfig[k] && allData[k]) fd[k] = allData[k]; });
        if(!Object.keys(fd).length) return showAlert("請選擇匯出項目");
        const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([JSON.stringify(fd, null, 2)], { type: 'application/json' })); link.download = `ikb_backup_${Date.now()}.json`; link.click(); logAction('系統備份', '匯出 JSON 資料庫');
      };

      const handleExportInventoryCSV = () => {
        const headers = ['時間', '紀錄ID', '食材名稱', '變動數量', '單位成本', '總成本(花費)', '變動倉庫', '操作事由'];
        const rows = inventoryLogs.map(l => [
          new Date(l.timestamp).toLocaleString(), l.id, l.ingredientName, l.changeQty, 
          l.costPerItem, l.changeQty * l.costPerItem, warehouses.find(w=>w.id===l.warehouseId)?.name || '未知', l.reason
        ]);
        const csvStr = [headers.join(','), ...rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))].join('\n');
        downloadCSV(csvStr, `inventory_logs_${Date.now()}.csv`);
        logAction('報表匯出', '匯出庫存進退貨紀錄(CSV)');
      };

      const handleExportOperationLogsCSV = () => {
        const headers = ['時間', '操作人員', '動作類型', '詳細內容'];
        const rows = operationLogs.map(l => [
          new Date(l.timestamp).toLocaleString(), l.userName, l.action, l.details
        ]);
        const csvStr = [headers.join(','), ...rows.map(r => r.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))].join('\n');
        downloadCSV(csvStr, `operation_logs_${Date.now()}.csv`);
        logAction('報表匯出', '匯出系統操作日誌(CSV)');
      };

      const handleFile = (e) => {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader(); r.onload = (ev) => {
          try { const d = JSON.parse(ev.target.result); setPendingImport(d); const ic = {}; Object.keys(d).forEach(k => { if(COLL_NAMES_MAP[k]) ic[k]=true; }); setImportConfig(ic); setImportStatus(''); } catch(err) { showAlert("JSON格式錯誤"); }
          e.target.value = '';
        }; r.readAsText(f);
      };

      const execImport = async () => {
        if(!pendingImport) return; setIsImporting(true); setImportStatus('核心覆寫協議執行中...');
        try {
          let c = 0;
          for (const [coll, docsArr] of Object.entries(pendingImport)) {
            if(!importConfig[coll]) continue;
            for (const docData of docsArr) {
              const { id, ...rest } = docData; if(!id) continue; let targetId = id;
              if (rest.name && ['bar_users','bar_roles','bar_categories','bar_items','bar_activities','bar_ingredients'].includes(coll)) {
                const exist = allData[coll.replace('bar_','')]?.find(d => d.name === rest.name); if(exist) targetId = exist.id;
              }
              await setDoc(getDocRef(coll, targetId), rest); c++;
            }
          }
          setImportStatus(`覆寫成功。重建索引：${c} 個節點。`); logAction('系統還原', `更新 ${c} 筆`); setPendingImport(null);
        } catch(err) { setImportStatus(`核心錯誤: ${err.message}`); } finally { setIsImporting(false); }
      };

      const addWarehouse = async () => {
        if (!newWhName.trim()) return;
        const updatedWarehouses = [...warehouses, { id: 'w_' + Date.now(), name: newWhName, capacity: Number(newWhCapacity) || 0 }];
        await setDoc(getDocRef('bar_settings', 'config'), { warehouses: updatedWarehouses }, {merge:true});
        logAction('系統設定', `新增倉庫: ${newWhName}`);
        setNewWhName('');
        setNewWhCapacity('');
      };

      const editWarehouse = (w) => {
        showEdit({
          title: '編輯倉庫與容量設定',
          fields: [
            { key: 'name', label: '倉庫名稱', defaultValue: w.name },
            { key: 'capacity', type: 'number', label: '容量上限 (kg/L) - 輸入 0 為無限制', defaultValue: w.capacity || '' }
          ],
          onSave: async (v) => {
            if (v.name) {
              const updated = warehouses.map(item => item.id === w.id ? { ...item, name: v.name, capacity: Number(v.capacity) || 0 } : item);
              await setDoc(getDocRef('bar_settings', 'config'), { warehouses: updated }, { merge: true });
              logAction('系統設定', `編輯倉庫: ${v.name}`);
            }
          }
        });
      };

      const delWarehouse = (wId) => {
        if (warehouses.length <= 1) return showAlert("系統至少需要保留一個倉庫");
        showConfirm("確定要刪除此倉庫節點嗎？", async () => {
          const updatedWarehouses = warehouses.filter(w => w.id !== wId);
          await setDoc(getDocRef('bar_settings', 'config'), { warehouses: updatedWarehouses }, {merge:true});
          logAction('系統設定', `移除倉庫節點`);
        });
      };

      return (
        <Card className="max-w-5xl mx-auto border-yellow-950/50 bg-[#0a0a0c] p-0 overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)]">
          <div className="flex border-b border-[#1f1f25] bg-[#050505]">
            {[ {id:'preferences', l:'系統偏好', i:Sliders}, {id:'backup', l:'資料庫I/O', i:Settings}, {id:'logs', l:'操作端點追蹤', i:History} ].map(t=>(
              <button key={t.id} onClick={()=>setActiveTab(t.id)} className={`flex-1 py-4 font-bold flex items-center justify-center gap-2 ${activeTab===t.id?'bg-[#121216] text-yellow-500 border-b-2 border-yellow-500 shadow-[inset_0_-10px_20px_rgba(234,179,8,0.05)]':'text-gray-500 hover:text-gray-300 hover:bg-[#1a1a1f]'}`}>
                <t.i size={18}/> <span className="hidden sm:inline">{t.l}</span>
              </button>
            ))}
          </div>

          <div className="p-6 md:p-8 min-h-[500px]">
            {activeTab === 'preferences' && (
              <div className="space-y-8">
                <div>
                  <h3 className="text-xl font-bold text-white mb-4 border-b border-[#1f1f25] pb-2">倉庫與樓層管理</h3>
                  <div className="bg-[#050505] p-5 rounded-xl border border-[#1f1f25] shadow-inner">
                    <div className="flex flex-col sm:flex-row gap-2 mb-6">
                      <Input value={newWhName} onChange={e=>setNewWhName(e.target.value)} placeholder="新增樓層/倉庫名稱" className="w-full sm:w-64"/>
                      <Input type="number" value={newWhCapacity} onChange={e=>setNewWhCapacity(e.target.value)} placeholder="容量上限 (kg/L)" className="w-full sm:w-36"/>
                      <Button onClick={addWarehouse} className="whitespace-nowrap">建立節點</Button>
                    </div>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                      {warehouses.map(w => (
                        <div key={w.id} className="bg-[#121216] border border-[#1f1f25] px-4 py-3 rounded-xl flex flex-col gap-2 group hover:border-[#33333b] transition-colors">
                          <div className="flex justify-between items-start">
                            <div className="flex items-center gap-2 text-sm text-white font-bold">
                              <Warehouse size={16} className="text-gray-400"/>
                              {w.name}
                            </div>
                            <div className="flex gap-1 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                              <button onClick={() => editWarehouse(w)} className="text-gray-500 hover:text-yellow-400 p-1"><Edit size={14}/></button>
                              <button onClick={() => delWarehouse(w.id)} className="text-gray-500 hover:text-red-400 p-1"><X size={14}/></button>
                            </div>
                          </div>
                          <div className="text-xs text-gray-500 font-mono bg-[#050505] border border-[#1f1f25] px-2 py-1 rounded-md inline-block w-fit mt-1">
                            容量: <span className="font-bold text-gray-300">{w.capacity ? `${w.capacity} kg/L` : '無限制'}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                <div>
                  <h3 className="text-xl font-bold text-white mb-4 border-b border-[#1f1f25] pb-2">全域成本運算引擎</h3>
                  <label className="flex items-start gap-4 p-5 bg-[#050505] border border-[#1f1f25] rounded-xl cursor-pointer hover:border-red-900/50 group shadow-inner">
                    <input type="checkbox" checked={systemConfig.ignoreAllCosts} onChange={async(e)=>{ const v=e.target.checked; await setDoc(getDocRef('bar_settings', 'config'), {ignoreAllCosts:v}, {merge:true}); logAction('系統設定', `全域無視成本: ${v}`); }} className="mt-1 w-5 h-5 accent-red-600"/>
                    <div>
                      <div className="font-black text-gray-200 text-lg group-hover:text-red-400">強制終止成本計算 (IGNORE_ALL_COSTS)</div>
                      <div className="text-sm text-gray-500 mt-2 leading-relaxed">啟動此覆寫指令後，儀表板的「淨利」模組將 100% 映射「總營收」，且結帳運算核心將忽略所有配方成本。<br/><span className="text-yellow-600 font-bold">*註：庫存數量的自動扣除機制 (Stock Deductions) 不受此指令影響，仍會正常運作。</span></div>
                    </div>
                  </label>
                </div>
              </div>
            )}
            
            {activeTab === 'backup' && (
              <div className="space-y-8">
                <div className="bg-[#050505] p-6 rounded-xl border border-[#1f1f25]">
                  <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2"><FileSpreadsheet className="text-green-500"/> Excel (CSV) 報表匯出</h3>
                  <p className="text-sm text-gray-400 mb-4">匯出包含 UTF-8 編碼的 CSV 檔案，可直接使用 Excel 開啟且不會亂碼，適用於每日對帳與分析。</p>
                  <div className="flex flex-wrap gap-4">
                    <Button onClick={handleExportInventoryCSV} className="bg-green-700 hover:bg-green-600 border-green-600"><FileSpreadsheet size={16}/> 匯出 庫存進退貨紀錄</Button>
                    <Button onClick={handleExportOperationLogsCSV} className="bg-green-700 hover:bg-green-600 border-green-600"><FileSpreadsheet size={16}/> 匯出 系統操作日誌</Button>
                  </div>
                </div>

                <div className="bg-[#050505] p-6 rounded-xl border border-[#1f1f25]">
                  <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2"><Download className="text-blue-500"/> 系統資料庫打包 (JSON)</h3>
                  <p className="text-sm text-gray-400 mb-4">將完整的系統架構資料打包為 JSON 格式，僅供系統還原與資料遷移使用。</p>
                  <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 mb-6">
                    {Object.entries(COLL_NAMES_MAP).map(([k, l]) => (
                      <label key={k} className={`flex items-center gap-2 p-2 rounded border cursor-pointer ${exportConfig[k] ? 'border-blue-900/50 bg-blue-950/20' : 'border-[#1f1f25] hover:border-[#33333b]'}`}>
                        <input type="checkbox" checked={exportConfig[k]||false} onChange={e=>setExportConfig({...exportConfig, [k]:e.target.checked})} className="w-4 h-4 accent-blue-600"/>
                        <span className={`text-sm font-mono ${exportConfig[k] ? 'text-white' : 'text-gray-500'}`}>{l}</span>
                      </label>
                    ))}
                  </div>
                  <Button onClick={handleExport} className="w-full sm:w-auto bg-blue-600 hover:bg-blue-500 shadow-blue-900/50 border-blue-500"><FileJson size={18}/> 建立 JSON 備份封裝</Button>
                </div>

                <div className="bg-red-950/20 p-6 rounded-xl border border-red-900/30">
                  <h3 className="text-lg font-bold text-red-400 mb-4 flex items-center gap-2"><Upload/> 核心覆寫與還原 (Restore)</h3>
                  <input type="file" accept=".json" ref={fileInputRef} onChange={handleFile} className="hidden" />
                  {!pendingImport ? (
                    <Button variant="outline" onClick={()=>fileInputRef.current?.click()} className="text-red-400 border-red-900/50 hover:bg-red-950/40 w-full sm:w-auto">掛載外部 JSON 封裝檔</Button>
                  ) : (
                    <div className="border border-red-900/50 bg-[#050505] p-5 rounded-lg shadow-inner">
                      <div className="flex justify-between items-center mb-4 border-b border-[#1f1f25] pb-2">
                        <h4 className="font-bold text-red-400 font-mono tracking-widest uppercase">Select Modules to Overwrite</h4>
                        <button onClick={()=>setPendingImport(null)} className="text-gray-500 hover:text-white bg-[#121216] p-1 rounded"><X size={18}/></button>
                      </div>
                      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 mb-6">
                        {Object.keys(pendingImport).filter(k=>COLL_NAMES_MAP[k]).map(k => (
                          <label key={k} className={`flex items-center gap-2 p-2 rounded border cursor-pointer ${importConfig[k] ? 'border-red-900/50 bg-red-950/30' : 'border-[#1f1f25] hover:border-[#33333b]'}`}>
                            <input type="checkbox" checked={importConfig[k]||false} onChange={e=>setImportConfig({...importConfig, [k]:e.target.checked})} className="w-4 h-4 accent-red-600"/>
                            <span className={`text-sm font-mono ${importConfig[k] ? 'text-red-200 font-bold' : 'text-gray-500'}`}>{COLL_NAMES_MAP[k]} <span className="text-[10px]">({pendingImport[k].length})</span></span>
                          </label>
                        ))}
                      </div>
                      <Button variant="danger" onClick={execImport} disabled={isImporting || !Object.values(importConfig).some(v=>v)} className="w-full font-black tracking-widest shadow-[0_0_15px_rgba(220,38,38,0.4)]">
                        {isImporting ? 'EXECUTING OVERWRITE...' : 'CONFIRM OVERWRITE AND RESTORE'}
                      </Button>
                    </div>
                  )}
                  {importStatus && <p className={`mt-4 text-sm font-mono tracking-wide ${importStatus.includes('成功') ? 'text-green-400 drop-shadow-[0_0_5px_#22c55e]' : 'text-red-500 drop-shadow-[0_0_5px_#ef4444]'}`}>{importStatus}</p>}
                </div>
              </div>
            )}

            {activeTab === 'logs' && (
              <div className="h-full flex flex-col">
                <div className="flex items-center justify-between mb-4 bg-[#050505] p-3 rounded-lg border border-[#1f1f25]">
                  <p className="text-xs text-gray-400 font-mono">SYS_LOG_RETENTION: 30 DAYS</p>
                  <div className="text-xs bg-yellow-950/30 text-yellow-500 px-3 py-1 rounded-full border border-yellow-900/50 font-bold tracking-widest">
                    TOTAL: {operationLogs.length}
                  </div>
                </div>
                <div className="overflow-x-auto overflow-y-auto max-h-[500px] border border-[#1f1f25] rounded-xl bg-[#050505] custom-scrollbar shadow-inner">
                  <table className="w-full text-left border-collapse">
                    <thead className="bg-[#0a0a0c] sticky top-0 z-10 border-b border-[#1f1f25]">
                      <tr>
                        <th className="p-3 text-gray-500 text-[10px] tracking-widest uppercase border-b border-[#1f1f25]">Timestamp</th>
                        <th className="p-3 text-gray-500 text-[10px] tracking-widest uppercase border-b border-[#1f1f25]">Operator</th>
                        <th className="p-3 text-gray-500 text-[10px] tracking-widest uppercase border-b border-[#1f1f25]">Action</th>
                        <th className="p-3 text-gray-500 text-[10px] tracking-widest uppercase border-b border-[#1f1f25]">Data Node</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-[#1f1f25] font-mono text-sm">
                      {[...operationLogs].sort((a,b)=>b.timestamp-a.timestamp).map(l => (
                        <tr key={l.id} className="hover:bg-[#121216]">
                          <td className="p-3 text-xs text-gray-500">{new Date(l.timestamp).toLocaleString()}</td>
                          <td className="p-3 text-gray-300">{l.userName}</td>
                          <td className="p-3 font-bold text-yellow-500/80">{l.action}</td>
                          <td className="p-3 text-gray-400 truncate max-w-xs">{l.details}</td>
                        </tr>
                      ))}
                      {operationLogs.length === 0 && <tr><td colSpan="4" className="text-center p-10 text-gray-600">NO LOGS FOUND</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        </Card>
      );
    };

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>

</body>
</html>
